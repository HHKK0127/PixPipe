hunks[1]);\n    }\n}\n\n// New #8: Metadata Editor\nfn render_meta_edit(f: \u0026mut Frame, app: \u0026mut App, area: Rect) {\n    let theme = app.theme();\n\n    let chunks = Layout::default()\n        .direction(Direction::Vertical)\n        .constraints([Constraint::Min(0), Constraint::Length(3)])\n        .split(area);\n\n    let visible = chunks[0].height.saturating_sub(2) as usize;\n    let start = app\n        .meta_scroll\n        .min(app.meta_files.len().saturating_sub(visible));\n    let end = (start + visible).min(app.meta_files.len());\n\n    let mut lines = vec![\n        Line::from(Span::styled(\n            format!(\"  {:\u003e4}  {:\u003c40}  {}\", \" \", \"Filename\", \"Select\"),\n            Style::default()\n                .fg(theme.primary)\n                .add_modifier(Modifier::BOLD),\n        )),\n        Line::from(Span::styled(\n            \"  ─────────────────────────────────────────────────────────\",\n            Style::default().fg(theme.muted),\n        )),\n    ];\n\n    for (i, (name, selected)) in app.meta_files[start..end].iter().enumerate() {\n        let idx = start + i;\n        let prefix = if idx == app.meta_scroll { \"▶\" } else { \" \" };\n        let check = if *selected { \"✓\" } else { \" \" };\n        let style = if idx == app.meta_scroll {\n            Style::default().fg(theme.accent).bg(theme.bg_highlight)\n        } else if *selected {\n            Style::default().fg(theme.success)\n        } else {\n            Style::default().fg(Color::White)\n        };\n        lines.push(Line::from(Span::styled(\n            format!(\"  {} {:\u003e4}  {:\u003c40}  [{}]\", prefix, idx + 1, name, check),\n            style,\n        )));\n    }\n\n    let list = Paragraph::new(lines).block(Block::default().borders(Borders::ALL).title(format!(\n        \"Metadata Editor ({}/{} selected)\",\n        app.meta_files.iter().filter(|(_, s)| *s).count(),\n        app.meta_files.len()\n    )));\n    f.render_widget(list, chunks[0]);\n\n    let fields = [\"DateTime\", \"Artist\", \"Remove All\"];\n    let field_str: Vec\u003cString\u003e = fields\n        .iter()\n        .enumerate()\n        .map(|(i, f)| {\n            if i == app.meta_field {\n                format!(\"[{f}]\")\n            } else {\n                f.to_string()\n            }\n        })\n        .collect();\n    let help = Paragraph::new(format!(\n        \"  Tab: Field ({}) │ x: Remove Meta │ a: Select All │ Esc: Back\",\n        field_str.join(\"/\")\n    ))\n    .style(Style::default().fg(theme.muted))\n    .block(Block::default().borders(Borders::ALL).title(\"Actions\"));\n    f.render_widget(help, chunks[1]);\n}\n\n// New #19: Config Import/Export\nfn render_config_io(f: \u0026mut Frame, app: \u0026mut App, area: Rect) {\n    let theme = app.theme();\n\n    let chunks = Layout::default()\n        .direction(Direction::Vertical)\n        .constraints([Constraint::Min(0), Constraint::Length(3)])\n        .split(area);\n\n    let options = [\"Export Config\", \"Import Config\"];\n    let items: Vec\u003cListItem\u003e = options\n        .iter()\n        .enumerate()\n        .map(|(i, opt)| {\n            let prefix = if i == app.config_io_selected {\n                \"▶ \"\n            } else {\n                \"  \"\n            };\n            let style = if i == app.config_io_selected {\n                Style::default()\n                    .fg(theme.accent)\n                    .add_modifier(Modifier::BOLD)\n            } else {\n                Style::default().fg(Color::White)\n            };\n            ListItem::new(Line::from(Span::styled(format!(\"{prefix}  {opt}\"), style)))\n        })\n        .collect();\n\n    let list = List::new(items).block(\n        Block::default()\n            .borders(Borders::ALL)\n            .title(\"Config Import/Export\"),\n    );\n    f.render_widget(list, chunks[0]);\n\n    if app.config_io_adding {\n        let input = Paragraph::new(format!(\"  Path: {}_\", app.config_io_path))\n            .style(Style::default().fg(theme.warning))\n            .block(\n                Block::default()\n                    .borders(Borders::ALL)\n                    .title(\"Import Path (Enter to confirm)\"),\n            );\n        f.render_widget(input, chunks[1]);\n    } else {\n        let help = Paragraph::new(\"  e: Export │ i: Import │ Esc: Back\")\n            .style(Style::default().fg(theme.muted))\n            .block(Block::default().borders(Borders::ALL).title(\"Actions\"));\n        f.render_widget(help, chunks[1]);\n    }\n}\n\n// New #20: Plugins\nfn render_plugins(f: \u0026mut Frame, app: \u0026mut App, area: Rect) {\n    let theme = app.theme();\n\n    let chunks = Layout::default()\n        .direction(Direction::Vertical)\n        .constraints([Constraint::Min(0), Constraint::Length(3)])\n        .split(area);\n\n    if app.plugins.is_empty() {\n        let empty = Paragraph::new(\"  No plugins found. Add .json plugin files to ./plugins/\")\n            .style(Style::default().fg(theme.muted))\n            .block(Block::default().borders(Borders::ALL).title(\"Plugins\"));\n        f.render_widget(empty, chunks[0]);\n    } else {\n        let items: Vec\u003cListItem\u003e = app\n            .plugins\n            .iter()\n            .enumerate()\n            .map(|(i, plugin)| {\n                let prefix = if i == app.plugin_selected {\n                    \"▶ \"\n                } else {\n                    \"  \"\n                };\n                let status = if plugin.enabled { \"● ON\" } else { \"○ OFF\" };\n                let status_color = if plugin.enabled {\n                    theme.success\n                } else {\n                    theme.muted\n                };\n                let style = if i == app.plugin_selected {\n                    Style::default()\n                        .fg(theme.accent)\n                        .bg(theme.bg_highlight)\n                        .add_modifier(Modifier::BOLD)\n                } else {\n                    Style::default().fg(Color::White)\n                };\n                ListItem::new(Line::from(vec![\n                    Span::styled(\n                        format!(\"{prefix}  {status} \"),\n                        Style::default().fg(status_color),\n                    ),\n                    Span::styled(format!(\"{} - {}\", plugin.name, plugin.description), style),\n                ]))\n            })\n            .collect();\n\n        let list = List::new(items).block(Block::default().borders(Borders::ALL).title(\"Plugins\"));\n        f.render_widget(list, chunks[0]);\n    }\n\n    let help = Paragraph::new(\"  j/k: Select │ Space: Toggle │ r: Scan │ o: Open Dir │ Esc: Back\")\n        .style(Style::default().fg(theme.muted))\n        .block(Block::default().borders(Borders::ALL).title(\"Actions\"));\n    f.render_widget(help, chunks[1]);\n}\n\n// New #15: Statusbar Customization\nfn render_statusbar_custom(f: \u0026mut Frame, app: \u0026mut App, area: Rect) {\n    let theme = app.theme();\n\n    let items: Vec\u003cListItem\u003e = app\n        .statusbar_items\n        .iter()\n        .enumerate()\n        .map(|(i, (name, enabled))| {\n            let prefix = if i == app.statusbar_selected {\n                \"▶ \"\n            } else {\n                \"  \"\n            };\n            let status = if *enabled { \"✓\" } else { \"✗\" };\n            let status_color = if *enabled { theme.success } else { theme.error };\n            let style = if i == app.statusbar_selected {\n                Style::default()\n                    .fg(theme.accent)\n                    .bg(theme.bg_highlight)\n                    .add_modifier(Modifier::BOLD)\n            } else {\n                Style::default().fg(Color::White)\n            };\n            ListItem::new(Line::from(vec![\n                Span::styled(format!(\"{prefix}  {name} \"), style),\n                Span::styled(format!(\"[{status}]\"), Style::default().fg(status_color)),\n            ]))\n        })\n        .collect();\n\n    let list = List::new(items).block(\n        Block::default()\n            .borders(Borders::ALL)\n            .title(\"Statusbar Items (Space to toggle, Enter to save)\"),\n    );\n    f.render_widget(list, area);\n}\n\n// ============================================================\n// Core processing functions\n// ============================================================\n\nfn is_image_file(path: \u0026Path) -\u003e bool {\n    path.extension()\n        .and_then(|ext| ext.to_str())\n        .is_some_and(|ext| {\n            DEFAULT_IMAGE_EXTENSIONS\n                .iter()\n                .any(|e| e.eq_ignore_ascii_case(\u0026format!(\".{ext}\")))\n        })\n}\n\nfn calculate_sha256(path: \u0026PathBuf) -\u003e anyhow::Result\u003cString\u003e {\n    let file = fs::File::open(path)?;\n    let mut reader = BufReader::with_capacity(BUFFER_SIZE, file);\n    let mut hasher = Sha256::new();\n    let mut buffer = [0; BUFFER_SIZE];\n\n    loop {\n        let n = reader.read(\u0026mut buffer)?;\n        if n == 0 {\n            break;\n        }\n        hasher.update(\u0026buffer[..n]);\n    }\n\n    Ok(format!(\"{:x}\", hasher.finalize()))\n}\n\n// ============================================================\n// EXIF Metadata Parsing\n// ============================================================\n\nfn parse_exif(path: \u0026PathBuf) -\u003e Option\u003cVec\u003c(String, String)\u003e\u003e {\n    let file = std::fs::File::open(path).ok()?;\n    let mut bufreader = std::io::BufReader::new(file);\n    let exif = exif::Reader::new()\n        .read_from_container(\u0026mut bufreader)\n        .ok()?;\n\n    let mut entries = Vec::new();\n\n    // Key EXIF fields\n    let fields = [\n        (exif::Tag::Make, \"Camera Make\"),\n        (exif::Tag::Model, \"Camera Model\"),\n        (exif::Tag::DateTimeOriginal, \"Date Taken\"),\n        (exif::Tag::ExposureTime, \"Shutter Speed\"),\n        (exif::Tag::FNumber, \"Aperture\"),\n        (exif::Tag::PhotographicSensitivity, \"ISO\"),\n        (exif::Tag::FocalLength, \"Focal Length\"),\n        (exif::Tag::ImageWidth, \"Width\"),\n        (exif::Tag::ImageLength, \"Height\"),\n        (exif::Tag::Orientation, \"Orientation\"),\n        (exif::Tag::Software, \"Software\"),\n        (exif::Tag::Artist, \"Artist\"),\n        (exif::Tag::ImageDescription, \"Description\"),\n    ];\n\n    for (tag, label) in \u0026fields {\n        if let Some(field) = exif.get_field(*tag, exif::In::PRIMARY) {\n            let value = field.display_value().to_string();\n            if !value.is_empty() {\n                entries.push((label.to_string(), value));\n            }\n        }\n    }\n\n    // GPS info\n    if let Some(lat_field) = exif.get_field(exif::Tag::GPSLatitude, exif::In::PRIMARY) {\n        if let Some(lon_field) = exif.get_field(exif::Tag::GPSLongitude, exif::In::PRIMARY) {\n            let lat = lat_field.display_value().to_string();\n            let lon = lon_field.display_value().to_string();\n            entries.push((\"GPS\".to_string(), format!(\"{lat}, {lon}\")));\n        }\n    }\n\n    if entries.is_empty() {\n        None\n    } else {\n        Some(entries)\n    }\n}\n\n// ============================================================\n// Perceptual Hash (Similar Image Detection)\n// ============================================================\n\n/// Average Hash (aHash): resize to 8x8 grayscale, compare to mean\nfn calculate_ahash(path: \u0026PathBuf) -\u003e anyhow::Result\u003cu64\u003e {\n    let img = image::open(path)?;\n    let gray = img\n        .resize_exact(8, 8, image::imageops::FilterType::Lanczos3)\n        .to_luma8();\n    let pixels: Vec\u003cu8\u003e = gray.pixels().map(|p| p[0]).collect();\n    let mean: u64 = pixels.iter().map(|\u0026p| u64::from(p)).sum::\u003cu64\u003e() / 64;\n    let mut hash: u64 = 0;\n    for (i, \u0026pixel) in pixels.iter().enumerate() {\n        if u64::from(pixel) \u003e= mean {\n            hash |= 1 \u003c\u003c (63 - i);\n        }\n    }\n    Ok(hash)\n}\n\n/// Difference Hash (dHash): compare adjacent pixels horizontally\nfn calculate_dhash(path: \u0026PathBuf) -\u003e anyhow::Result\u003cu64\u003e {\n    let img = image::open(path)?;\n    let gray = img\n        .resize_exact(9, 8, image::imageops::FilterType::Lanczos3)\n        .to_luma8();\n    let pixels: Vec\u003cu8\u003e = gray.pixels().map(|p| p[0]).collect();\n    let mut hash: u64 = 0;\n    for row in 0..8 {\n        for col in 0..8 {\n            let idx = row * 9 + col;\n            if pixels[idx] \u003c pixels[idx + 1] {\n                hash |= 1 \u003c\u003c (63 - (row * 8 + col));\n            }\n        }\n    }\n    Ok(hash)\n}\n\n/// Hamming distance between two 64-bit hashes\nfn hamming_distance(a: u64, b: u64) -\u003e u32 {\n    (a ^ b).count_ones()\n}\n\nfn rename_by_timestamp(dest: \u0026str) -\u003e anyhow::Result\u003c()\u003e {\n    let entries: Vec\u003c_\u003e = fs::read_dir(dest)?\n        .filter_map(std::result::Result::ok)\n        .filter(|e| e.path().is_file() \u0026\u0026 is_image_file(\u0026e.path()))\n        .collect();\n\n    for entry in entries {\n        let path = entry.path();\n        let file_name = safe_file_name(\u0026path);\n\n        if file_name.starts_with(|c: char| c.is_numeric()) \u0026\u0026 file_name.len() \u003e 14 {\n            continue;\n        }\n\n        let ext = safe_extension(\u0026path);\n        let metadata = fs::metadata(\u0026path)?;\n        let modified = metadata.modified()?;\n        let datetime: chrono::DateTime\u003cchrono::Local\u003e = modified.into();\n        let timestamp = datetime.format(\"%Y%m%d%H%M%S\").to_string();\n\n        let new_name = format!(\"{timestamp}.{ext}\");\n        let final_name = get_unique_filename(\u0026path, \u0026new_name)?;\n\n        let new_path = safe_parent(\u0026path).join(\u0026final_name);\n        fs::rename(\u0026path, \u0026new_path)?;\n    }\n    Ok(())\n}\n\nfn get_unique_filename(path: \u0026Path, name: \u0026str) -\u003e anyhow::Result\u003cString\u003e {\n    let mut new_path = safe_parent(path);\n    new_path.push(name);\n\n    if !new_path.exists() {\n        return Ok(name.to_string());\n    }\n\n    // Separate stem and extension from the name\n    let name_path = PathBuf::from(name);\n    let stem = safe_file_stem(\u0026name_path);\n    let ext = safe_extension(\u0026name_path);\n\n    for i in 0..10 {\n        let candidate = if ext.is_empty() {\n            format!(\"{stem}{i}\")\n        } else {\n            format!(\"{stem}.{i}{ext}\")\n        };\n        let candidate_path = safe_parent(path).join(\u0026candidate);\n        if !candidate_path.exists() {\n            return Ok(candidate);\n        }\n    }\n\n    Err(anyhow::anyhow!(\"Could not find unique filename\"))\n}\n\nfn rename_remove_underscore_parens(dest: \u0026str) -\u003e anyhow::Result\u003c()\u003e {\n    let entries: Vec\u003c_\u003e = fs::read_dir(dest)?\n        .filter_map(std::result::Result::ok)\n        .filter(|e| e.path().is_file() \u0026\u0026 is_image_file(\u0026e.path()))\n        .collect();\n\n    for entry in entries {\n        let path = entry.path();\n        let file_stem = safe_file_stem(\u0026path);\n        let ext = safe_extension(\u0026path);\n\n        let new_name = if is_digit_underscore_digit(\u0026file_stem) {\n            format!(\"{}.{}\", file_stem.replace('_', \"\"), ext)\n        } else if let Some(cleaned) = remove_trailing_parentheses(\u0026file_stem) {\n            format!(\"{cleaned}.{ext}\")\n        } else {\n            continue;\n        };\n\n        let final_name = get_unique_filename(\u0026path, \u0026new_name)?;\n        let new_path = safe_parent(\u0026path).join(\u0026final_name);\n        fs::rename(\u0026path, \u0026new_path)?;\n    }\n    Ok(())\n}\n\nfn is_digit_underscore_digit(s: \u0026str) -\u003e bool {\n    let parts: Vec\u003c\u0026str\u003e = s.split('_').collect();\n    parts.len() == 2\n        \u0026\u0026 parts[0].chars().all(char::is_numeric)\n        \u0026\u0026 parts[1].chars().all(char::is_numeric)\n}\n\nfn remove_trailing_parentheses(s: \u0026str) -\u003e Option\u003cString\u003e {\n    if !s.ends_with(')') || !s.contains('(') {\n        return None;\n    }\n\n    let pos = s.rfind('(')?;\n    let inner = \u0026s[pos + 1..].trim_end_matches(')');\n\n    if inner.chars().all(char::is_numeric) {\n        Some(s[..pos].trim_end().to_string())\n    } else {\n        None\n    }\n}\n\nfn convert_to_jxl(dest: \u0026str) -\u003e anyhow::Result\u003c()\u003e {\n    let status = Command::new(\"powershell\")\n        .args([\"-NoProfile\", \"-ExecutionPolicy\", \"Bypass\", \"-File\"])\n        .arg(r\"Z:\\Closet\\bat\\jpg-to-jxl.ps1\")\n        .arg(\"-convertPath\")\n        .arg(dest)\n        .status()?;\n\n    if !status.success() {\n        return Err(anyhow::anyhow!(\"JXL conversion failed\"));\n    }\n    Ok(())\n}\n\n// ============================================================\n// Image Resize\n// ============================================================\n\nfn resize_images(dest: \u0026str, max_w: u32, max_h: u32, log: \u0026dyn Fn(String)) -\u003e usize {\n    let mut count = 0;\n    let entries: Vec\u003c_\u003e = fs::read_dir(dest)\n        .ok()\n        .map(|d| {\n            d.flatten()\n                .filter(|e| {\n                    let p = e.path();\n                    p.is_file() \u0026\u0026 {\n                        let ext = p\n                            .extension()\n                            .and_then(|e| e.to_str())\n                            .unwrap_or(\"\")\n                            .to_string()\n                            .to_lowercase();\n                        [\"jpg\", \"jpeg\", \"png\", \"bmp\", \"webp\", \"tiff\"].contains(\u0026ext.as_str())\n                    }\n                })\n                .collect()\n        })\n        .unwrap_or_default();\n\n    for entry in entries {\n        let path = entry.path();\n        if let Ok(img) = image::open(\u0026path) {\n            let (w, h) = img.dimensions();\n            if w \u003e max_w || h \u003e max_h {\n                let ratio = (f64::from(max_w) / f64::from(w)).min(f64::from(max_h) / f64::from(h));\n                let new_w = (f64::from(w) * ratio) as u32;\n                let new_h = (f64::from(h) * ratio) as u32;\n                let resized = img.resize_exact(new_w, new_h, image::imageops::FilterType::Lanczos3);\n                if let Err(e) = resized.save(\u0026path) {\n                    log(format!(\"  Resize error {}: {}\", path.display(), e));\n                } else {\n                    log(format!(\n                        \"  Resized: {} ({}x{} -\u003e {}x{})\",\n                        path.display(),\n                        w,\n                        h,\n                        new_w,\n                        new_h\n                    ));\n                    count += 1;\n                }\n            }\n        }\n    }\n    count\n}\n\n// ============================================================\n// Watermark Overlay\n// ============================================================\n\nfn add_watermark(dest: \u0026str, _text: \u0026str, log: \u0026dyn Fn(String)) -\u003e usize {\n    use image::{Rgba, RgbaImage};\n\n    let mut count = 0;\n    let entries: Vec\u003c_\u003e = fs::read_dir(dest)\n        .ok()\n        .map(|d| {\n            d.flatten()\n                .filter(|e| {\n                    let p = e.path();\n                    p.is_file() \u0026\u0026 {\n                        let ext = p\n                            .extension()\n                            .and_then(|e| e.to_str())\n                            .unwrap_or(\"\")\n                            .to_string()\n                            .to_lowercase();\n                        [\"jpg\", \"jpeg\", \"png\", \"bmp\", \"webp\"].contains(\u0026ext.as_str())\n                    }\n                })\n                .collect()\n        })\n        .unwrap_or_default();\n\n    for entry in entries {\n        let path = entry.path();\n        if let Ok(img) = image::open(\u0026path) {\n            let mut rgba: RgbaImage = img.to_rgba8();\n            let (w, h) = rgba.dimensions();\n            // Draw semi-transparent watermark bar at bottom\n            let bar_height = 20u32.min(h / 10);\n            let bar_y = h - bar_height;\n            let wm_color = Rgba([0u8, 0, 0, 100]);\n            for y in bar_y..h {\n                for x in 0..w {\n                    let pixel = rgba.get_pixel_mut(x, y);\n                    // Alpha blend\n                    let alpha = f64::from(wm_color[3]) / 255.0;\n                    pixel[0] = (f64::from(pixel[0]) * (1.0 - alpha)\n                        + f64::from(wm_color[0]) * alpha) as u8;\n                    pixel[1] = (f64::from(pixel[1]) * (1.0 - alpha)\n                        + f64::from(wm_color[1]) * alpha) as u8;\n                    pixel[2] = (f64::from(pixel[2]) * (1.0 - alpha)\n                        + f64::from(wm_color[2]) * alpha) as u8;\n                }\n            }\n            if let Err(e) = rgba.save(\u0026path) {\n                log(format!(\"  Watermark error {}: {}\", path.display(), e));\n            } else {\n                log(format!(\"  Watermarked: {} (bar overlay)\", path.display()));\n                count += 1;\n            }\n        }\n    }\n    count\n}\n\n// ============================================================\n\nfn render_image_preview(f: \u0026mut Frame, app: \u0026mut App, area: Rect) {\n    let chunks = Layout::default()\n        .direction(Direction::Vertical)\n        .constraints([Constraint::Length(3), Constraint::Min(0)])\n        .split(area);\n\n    let path_info = if app.preview_image_path.is_empty() {\n        \"No image selected\".to_string()\n    } else {\n        app.preview_image_path.clone()\n    };\n    let header = Paragraph::new(Line::from(vec![\n        Span::styled(\n            \"  🖼️  Image Preview\",\n            Style::default()\n                .fg(Color::Magenta)\n                .add_modifier(Modifier::BOLD),\n        ),\n        Span::raw(format!(\"  │  {path_info}\")),\n    ]))\n    .block(\n        Block::default()\n            .borders(Borders::ALL)\n            .border_style(Style::default().fg(Color::Magenta)),\n    )\n    .alignment(ratatui::layout::Alignment::Left);\n    f.render_widget(header, chunks[0]);\n\n    if let Some(preview) = \u0026app.image_preview {\n        let inner = Layout::default()\n            .direction(Direction::Horizontal)\n            .constraints([Constraint::Percentage(70), Constraint::Percentage(30)])\n            .split(chunks[1]);\n\n        // ASCII art\n        let ascii_text: Vec\u003cLine\u003e = preview\n            .ascii_lines\n            .iter()\n            .map(|l| Line::from(Span::styled(l.clone(), Style::default().fg(Color::White))))\n            .collect();\n        let ascii_block = Paragraph::new(ascii_text).block(\n            Block::default()\n                .title(format!(\" {}x{} \", preview.width, preview.height))\n                .borders(Borders::ALL)\n                .border_style(Style::default().fg(Color::DarkGray)),\n        );\n        f.render_widget(ascii_block, inner[0]);\n\n        // File info\n        let info_lines = vec![\n            Line::from(vec![\n                Span::styled(\"File: \", Style::default().fg(Color::Yellow)),\n                Span::raw(\u0026preview.filename),\n            ]),\n            Line::from(vec![\n                Span::styled(\"Size: \", Style::default().fg(Color::Yellow)),\n                Span::raw(format!(\"{}x{}\", preview.width, preview.height)),\n            ]),\n            Line::from(vec![\n                Span::styled(\"Lines: \", Style::default().fg(Color::Yellow)),\n                Span::raw(format!(\"{}\", preview.ascii_lines.len())),\n            ]),\n        ];\n        let info_block = Paragraph::new(info_lines).block(\n            Block::default()\n                .title(\" Info \")\n                .borders(Borders::ALL)\n                .border_style(Style::default().fg(Color::DarkGray)),\n        );\n        f.render_widget(info_block, inner[1]);\n    } else {\n        let msg = Paragraph::new(\"  画像を選択するとASCIIプレビューが表示されます。\")\n            .style(Style::default().fg(Color::DarkGray))\n            .alignment(ratatui::layout::Alignment::Center);\n        f.render_widget(msg, chunks[1]);\n    }\n}\n\nfn render_split_pane(f: \u0026mut Frame, app: \u0026mut App, area: Rect) {\n    let chunks = Layout::default()\n        .direction(Direction::Vertical)\n        .constraints([Constraint::Length(3), Constraint::Min(0)])\n        .split(area);\n\n    let header = Paragraph::new(Line::from(vec![\n        Span::styled(\n            \"  📑  Split Pane View\",\n            Style::default()\n                .fg(Color::Cyan)\n                .add_modifier(Modifier::BOLD),\n        ),\n        Span::raw(\"  │  [Tab]パネル切替  [←→]リサイズ  [q]戻る\"),\n    ]))\n    .block(\n        Block::default()\n            .borders(Borders::ALL)\n            .border_style(Style::default().fg(Color::Cyan)),\n    );\n    f.render_widget(header, chunks[0]);\n\n    let panes = Layout::default()\n        .direction(Direction::Horizontal)\n        .constraints([Constraint::Percentage(50), Constraint::Percentage(50)])\n        .split(chunks[1]);\n\n    // Left pane - batch queue\n    let left_items: Vec\u003cListItem\u003e = app\n        .batch_queue\n        .iter()\n        .map(|job| {\n            let fname = std::path::Path::new(\u0026job.path)\n                .file_name()\n                .map_or_else(|| job.path.clone(), |n| n.to_string_lossy().to_string());\n            ListItem::new(Line::from(Span::raw(format!(\"  {fname}\"))))\n        })\n        .collect();\n    let left_list = List::new(left_items).block(\n        Block::default()\n            .title(\" Source Files \")\n            .borders(Borders::ALL)\n            .border_style(Style::default().fg(Color::Green)),\n    );\n    f.render_widget(left_list, panes[0]);\n\n    // Right pane - dest dir\n    let right_items: Vec\u003cListItem\u003e = app\n        .duplicate_groups\n        .iter()\n        .flat_map(|g| g.files.iter())\n        .map(|df| {\n            let fname = std::path::Path::new(\u0026df.0)\n                .file_name()\n                .map_or_else(|| df.0.clone(), |n| n.to_string_lossy().to_string());\n            ListItem::new(Line::from(Span::raw(format!(\"  {fname}\"))))\n        })\n        .collect();\n    let right_list = List::new(right_items).block(\n        Block::default()\n            .title(\" Destination Files \")\n            .borders(Borders::ALL)\n            .border_style(Style::default().fg(Color::Blue)),\n    );\n    f.render_widget(right_list, panes[1]);\n}\n\nfn render_quick_actions(f: \u0026mut Frame, app: \u0026mut App, area: Rect) {\n    let chunks = Layout::default()\n        .direction(Direction::Vertical)\n        .constraints([Constraint::Length(3), Constraint::Min(0)])\n        .split(area);\n\n    let header = Paragraph::new(Line::from(vec![\n        Span::styled(\n            \"  ⚡  Quick Actions\",\n            Style::default()\n                .fg(Color::Yellow)\n                .add_modifier(Modifier::BOLD),\n        ),\n        Span::raw(\"  │  [↑↓]選択  [Enter]実行  [q]戻る\"),\n    ]))\n    .block(\n        Block::default()\n            .borders(Borders::ALL)\n            .border_style(Style::default().fg(Color::Yellow)),\n    );\n    f.render_widget(header, chunks[0]);\n\n    let items: Vec\u003cListItem\u003e = app\n        .quick_actions\n        .iter()\n        .enumerate()\n        .map(|(i, (label, _))| {\n            let style = if i == app.quick_selected {\n                Style::default().fg(Color::Black).bg(Color::Yellow)\n            } else {\n                Style::default().fg(Color::White)\n            };\n            let icon = match i {\n                0 =\u003e \" \",\n                1 =\u003e \" \",\n                2 =\u003e \" \",\n                3 =\u003e \" \",\n                4 =\u003e \" \",\n                _ =\u003e \" \",\n            };\n            ListItem::new(Line::from(Span::styled(format!(\"  {icon} {label}\"), style)))\n        })\n        .collect();\n\n    let list = List::new(items).block(\n        Block::default()\n            .title(\" アクション \")\n            .borders(Borders::ALL)\n            .border_style(Style::default().fg(Color::DarkGray)),\n    );\n    f.render_widget(list, chunks[1]);\n}\n\nfn render_recent_files(f: \u0026mut Frame, app: \u0026mut App, area: Rect) {\n    let chunks = Layout::default()\n        .direction(Direction::Vertical)\n        .constraints([Constraint::Length(3), Constraint::Min(0)])\n        .split(area);\n\n    let header = Paragraph::new(Line::from(vec![\n        Span::styled(\n            \"  📂  Recent Files\",\n            Style::default()\n                .fg(Color::Green)\n                .add_modifier(Modifier::BOLD),\n        ),\n        Span::raw(format!(\n            \"  │  {} files  │  [↑↓]選択  [Enter]プレビュー  [q]戻る\",\n            app.recent_files.len()\n        )),\n    ]))\n    .block(\n        Block::default()\n            .borders(Borders::ALL)\n            .border_style(Style::default().fg(Color::Green)),\n    );\n    f.render_widget(header, chunks[0]);\n\n    if app.recent_files.is_empty() {\n        let msg = Paragraph::new(\"  最近処理したファイルはありません。\")\n            .style(Style::default().fg(Color::DarkGray))\n            .alignment(ratatui::layout::Alignment::Center);\n        f.render_widget(msg, chunks[1]);\n        return;\n    }\n\n    let items: Vec\u003cListItem\u003e = app\n        .recent_files\n        .iter()\n        .map(|rf| {\n            let fname = std::path::Path::new(\u0026rf.path)\n                .file_name()\n                .map_or_else(|| rf.path.clone(), |n| n.to_string_lossy().to_string());\n            let size_str = if rf.size \u003e 1_000_000 {\n                format!(\"{:.1} MB\", rf.size as f64 / 1_000_000.0)\n            } else {\n                format!(\"{:.1} KB\", rf.size as f64 / 1_000.0)\n            };\n            ListItem::new(Line::from(vec![\n                Span::styled(format!(\"  {fname} \"), Style::default().fg(Color::White)),\n                Span::styled(\n                    format!(\"[{size_str}] \"),\n                    Style::default().fg(Color::DarkGray),\n                ),\n                Span::styled(\n                    format!(\"{} \", rf.file_type),\n                    Style::default().fg(Color::Cyan),\n                ),\n                Span::styled(\u0026rf.processed_at, Style::default().fg(Color::DarkGray)),\n            ]))\n        })\n        .collect();\n\n    let list = List::new(items).block(\n        Block::default()\n            .title(\" 最近のファイル \")\n            .borders(Borders::ALL)\n            .border_style(Style::default().fg(Color::DarkGray)),\n    );\n    f.render_widget(list, chunks[1]);\n}\n\nfn render_tag_system(f: \u0026mut Frame, app: \u0026mut App, area: Rect) {\n    let chunks = Layout::default()\n        .direction(Direction::Vertical)\n        .constraints([Constraint::Length(3), Constraint::Min(0)])\n        .split(area);\n\n    let header = Paragraph::new(Line::from(vec![\n        Span::styled(\n            \"  🏷️  Tag System\",\n            Style::default()\n                .fg(Color::Blue)\n                .add_modifier(Modifier::BOLD),\n        ),\n        Span::raw(format!(\n            \"  │  {} tagged patterns  │  [↑↓]選択  [a]タグ追加  [d]削除  [q]戻る\",\n            app.file_tags.len()\n        )),\n    ]))\n    .block(\n        Block::default()\n            .borders(Borders::ALL)\n            .border_style(Style::default().fg(Color::Blue)),\n    );\n    f.render_widget(header, chunks[0]);\n\n    if app.file_tags.is_empty() {\n        let msg = Paragraph::new(\"  タグ付きファイルパターンはありません。[a]で追加してください。\")\n            .style(Style::default().fg(Color::DarkGray))\n            .alignment(ratatui::layout::Alignment::Center);\n        f.render_widget(msg, chunks[1]);\n        return;\n    }\n\n    let items: Vec\u003cListItem\u003e = app\n        .file_tags\n        .iter()\n        .enumerate()\n        .map(|(i, ft)| {\n            let style = if i == app.tag_selected {\n                Style::default().fg(Color::Black).bg(Color::Blue)\n            } else {\n                Style::default().fg(Color::White)\n            };\n            let tags_str = ft.tags.join(\", \");\n            ListItem::new(Line::from(vec![\n                Span::styled(format!(\"  📁 {} \", ft.file_pattern), style),\n                Span::styled(format!(\"[{tags_str}]\"), Style::default().fg(Color::Yellow)),\n            ]))\n        })\n        .collect();\n\n    let list = List::new(items).block(\n        Block::default()\n            .title(\" タグ \")\n            .borders(Borders::ALL)\n            .border_style(Style::default().fg(Color::DarkGray)),\n    );\n    f.render_widget(list, chunks[1]);\n}\n\nfn render_side_by_side_diff(f: \u0026mut Frame, app: \u0026mut App, area: Rect) {\n    let chunks = Layout::default()\n        .direction(Direction::Vertical)\n        .constraints([Constraint::Length(3), Constraint::Min(0)])\n        .split(area);\n\n    let header = Paragraph::new(Line::from(vec![\n        Span::styled(\n            \"  🔀  Side-by-side Diff\",\n            Style::default()\n                .fg(Color::Magenta)\n                .add_modifier(Modifier::BOLD),\n        ),\n        Span::raw(\"  │  [↑↓]スクロール  [Tab]フォーカス切替  [q]戻る\"),\n    ]))\n    .block(\n        Block::default()\n            .borders(Borders::ALL)\n            .border_style(Style::default().fg(Color::Magenta)),\n    );\n    f.render_widget(header, chunks[0]);\n\n    let panes = Layout::default()\n        .direction(Direction::Horizontal)\n        .constraints([Constraint::Percentage(50), Constraint::Percentage(50)])\n        .split(chunks[1]);\n\n    // Left side\n    let left_lines: Vec\u003cLine\u003e = if app.diff_left.is_empty() {\n        vec![Line::from(Span::styled(\n            \"  差分データがありません\",\n            Style::default().fg(Color::DarkGray),\n        ))]\n    } else {\n        app.diff_left\n            .iter()\n            .map(|l| {\n                let color = if l.starts_with('+') {\n                    Color::Green\n                } else if l.starts_with('-') {\n                    Color::Red\n                } else {\n                    Color::White\n                };\n                Line::from(Span::styled(format!(\"  {l}\"), Style::default().fg(color)))\n            })\n            .collect()\n    };\n    let left_para = Paragraph::new(left_lines).block(\n        Block::default()\n            .title(\" Original \")\n            .borders(Borders::ALL)\n            .border_style(Style::default().fg(Color::Red)),\n    );\n    f.render_widget(left_para, panes[0]);\n\n    // Right side\n    let right_lines: Vec\u003cLine\u003e = if app.diff_right.is_empty() {\n        vec![Line::from(Span::styled(\n            \"  差分データがありません\",\n            Style::default().fg(Color::DarkGray),\n        ))]\n    } else {\n        app.diff_right\n            .iter()\n            .map(|l| {\n                let color = if l.starts_with('+') {\n                    Color::Green\n                } else if l.starts_with('-') {\n                    Color::Red\n                } else {\n                    Color::White\n                };\n                Line::from(Span::styled(format!(\"  {l}\"), Style::default().fg(color)))\n            })\n            .collect()\n    };\n    let right_para = Paragraph::new(right_lines).block(\n        Block::default()\n            .title(\" Modified \")\n            .borders(Borders::ALL)\n            .border_style(Style::default().fg(Color::Green)),\n    );\n    f.render_widget(right_para, panes[1]);\n}\n\nfn render_file_tree_view(f: \u0026mut Frame, app: \u0026mut App, area: Rect) {\n    let chunks = Layout::default()\n        .direction(Direction::Vertical)\n        .constraints([Constraint::Length(3), Constraint::Min(0)])\n        .split(area);\n\n    let header = Paragraph::new(Line::from(vec![\n        Span::styled(\n            \"  🌳  File Tree\",\n            Style::default()\n                .fg(Color::Green)\n                .add_modifier(Modifier::BOLD),\n        ),\n        Span::raw(\"  │  [↑↓]選択  [Enter]展開/折畑  [q]戻る\"),\n    ]))\n    .block(\n        Block::default()\n            .borders(Borders::ALL)\n            .border_style(Style::default().fg(Color::Green)),\n    );\n    f.render_widget(header, chunks[0]);\n\n    if app.file_tree.is_empty() {\n        let msg = Paragraph::new(\"  ファイルツリーがありません。\")\n            .style(Style::default().fg(Color::DarkGray))\n            .alignment(ratatui::layout::Alignment::Center);\n        f.render_widget(msg, chunks[1]);\n        return;\n    }\n\n    let mut lines: Vec\u003cLine\u003e = Vec::new();\n    let mut counter = 0usize;\n    render_tree_nodes(\u0026app.file_tree, \u0026mut lines, \u0026mut counter, app.tree_selected);\n\n    let tree_para = Paragraph::new(lines).block(\n        Block::default()\n            .title(\" ディレクトリ構造 \")\n            .borders(Borders::ALL)\n            .border_style(Style::default().fg(Color::DarkGray)),\n    );\n    f.render_widget(tree_para, chunks[1]);\n}\n\nfn render_tree_nodes(\n    nodes: \u0026[FileTreeNode],\n    lines: \u0026mut Vec\u003cLine\u003e,\n    counter: \u0026mut usize,\n    selected: usize,\n) {\n    for node in nodes {\n        let indent = \"  \".repeat(node.depth);\n        let icon = if node.is_dir {\n            if node.expanded {\n                \"📂\"\n            } else {\n                \"📁\"\n            }\n        } else {\n            \"  \"\n        };\n        let style = if *counter == selected {\n            Style::default().fg(Color::Black).bg(Color::Green)\n        } else {\n            Style::default().fg(Color::White)\n        };\n        lines.push(Line::from(Span::styled(\n            format!(\n                \"{}{} {} {}\",\n                indent,\n                icon,\n                node.name,\n                if node.is_dir { \"/\" } else { \"\" }\n            ),\n            style,\n        )));\n        *counter += 1;\n        if node.expanded \u0026\u0026 !node.children.is_empty() {\n            render_tree_nodes(\u0026node.children, lines, counter, selected);\n        }\n    }\n}\n\nfn render_rename_pattern(f: \u0026mut Frame, app: \u0026mut App, area: Rect) {\n    let chunks = Layout::default()\n        .direction(Direction::Vertical)\n        .constraints([\n            Constraint::Length(3),\n            Constraint::Length(3),\n            Constraint::Min(0),\n        ])\n        .split(area);\n\n    let header = Paragraph::new(Line::from(vec![\n        Span::styled(\n            \"  ✏️  Batch Rename Pattern\",\n            Style::default()\n                .fg(Color::Yellow)\n                .add_modifier(Modifier::BOLD),\n        ),\n        Span::raw(format!(\n            \"  │  {} patterns  │  [a]追加  [↑↓]選択  [Tab]フィールド  [p]プレビュー  [q]戻る\",\n            app.rename_patterns.len()\n        )),\n    ]))\n    .block(\n        Block::default()\n            .borders(Borders::ALL)\n            .border_style(Style::default().fg(Color::Yellow)),\n    );\n    f.render_widget(header, chunks[0]);\n\n    // Pattern input area\n    let current_pattern = if let Some(pat) = app.rename_patterns.get(app.rename_selected) {\n        format!(\n            \"Pattern: {}  →  Replacement: {}  {}\",\n            pat.pattern,\n            pat.replacement,\n            if pat.use_regex { \"[Regex]\" } else { \"[Glob]\" }\n        )\n    } else {\n        \"パターンを選択してください\".to_string()\n    };\n    let input_style = if app.rename_field == 0 {\n        Color::Cyan\n    } else {\n        Color::Yellow\n    };\n    let input_block = Paragraph::new(Line::from(Span::styled(\n        format!(\"  {current_pattern}\"),\n        Style::default().fg(input_style),\n    )))\n    .block(\n        Block::default()\n            .title(\" Pattern \")\n            .borders(Borders::ALL)\n            .border_style(Style::default().fg(Color::DarkGray)),\n    );\n    f.render_widget(input_block, chunks[1]);\n\n    // Preview list\n    let preview_items: Vec\u003cListItem\u003e =\n        if let Some(pat) = app.rename_patterns.get(app.rename_selected) {\n            pat.preview\n                .iter()\n                .map(|(old, new)| {\n                    ListItem::new(Line::from(vec![\n                        Span::styled(format!(\"  {old} \"), Style::default().fg(Color::Red)),\n                        Span::styled(\"→ \", Style::default().fg(Color::DarkGray)),\n                        Span::styled(new.clone(), Style::default().fg(Color::Green)),\n                    ]))\n                })\n                .collect()\n        } else {\n            vec![ListItem::new(Line::from(Span::styled(\n                \"  プレビューなし\",\n                Style::default().fg(Color::DarkGray),\n            )))]\n        };\n    let preview_list = List::new(preview_items).block(\n        Block::default()\n            .title(\" プレビュー \")\n            .borders(Borders::ALL)\n            .border_style(Style::default().fg(Color::DarkGray)),\n    );\n    f.render_widget(preview_list, chunks[2]);\n}\n\nfn render_timeline(f: \u0026mut Frame, app: \u0026mut App, area: Rect) {\n    let chunks = Layout::default()\n        .direction(Direction::Vertical)\n        .constraints([Constraint::Length(3), Constraint::Min(0)])\n        .split(area);\n\n    let header = Paragraph::new(Line::from(vec![\n        Span::styled(\n            \"  ⏱️  Processing Timeline\",\n            Style::default()\n                .fg(Color::Cyan)\n                .add_modifier(Modifier::BOLD),\n        ),\n        Span::raw(format!(\n            \"  │  {} events  │  [↑↓]スクロール  [q]戻る\",\n            app.timeline_entries.len()\n        )),\n    ]))\n    .block(\n        Block::default()\n            .borders(Borders::ALL)\n            .border_style(Style::default().fg(Color::Cyan)),\n    );\n    f.render_widget(header, chunks[0]);\n\n    if app.timeline_entries.is_empty() {\n        let msg = Paragraph::new(\"  タイムラインイベントがありません。\")\n            .style(Style::default().fg(Color::DarkGray))\n            .alignment(ratatui::layout::Alignment::Center);\n        f.render_widget(msg, chunks[1]);\n        return;\n    }\n\n    let items: Vec\u003cListItem\u003e = app\n        .timeline_entries\n        .iter()\n        .map(|entry| {\n            let (icon, color) = match entry.event_type.as_str() {\n                \"start\" =\u003e (\"▶\", Color::Green),\n                \"progress\" =\u003e (\"●\", Color::Yellow),\n                \"complete\" =\u003e (\"✔\", Color::Cyan),\n                \"error\" =\u003e (\"✖\", Color::Red),\n                _ =\u003e (\"•\", Color::White),\n            };\n            let progress_bar = if entry.progress \u003e 0.0 {\n                let filled = (entry.progress * 20.0) as usize;\n                let empty = 20 - filled;\n                format!(\"[{}{}]\", \"█\".repeat(filled), \"░\".repeat(empty))\n            } else {\n                String::new()\n            };\n            ListItem::new(Line::from(vec![\n                Span::styled(format!(\"  {icon} \"), Style::default().fg(color)),\n                Span::styled(\n                    format!(\"[{}] \", entry.timestamp),\n                    Style::default().fg(Color::DarkGray),\n                ),\n                Span::raw(\u0026entry.description),\n                Span::styled(format!(\" {progress_bar}\"), Style::default().fg(color)),\n            ]))\n        })\n        .collect();\n\n    let list = List::new(items).block(\n        Block::default()\n            .title(\" タイムライン \")\n            .borders(Borders::ALL)\n            .border_style(Style::default().fg(Color::DarkGray)),\n    );\n    f.render_widget(list, chunks[1]);\n}\n\nfn render_command_palette(f: \u0026mut Frame, app: \u0026mut App, area: Rect) {\n    let chunks = Layout::default()\n        .direction(Direction::Vertical)\n        .constraints([Constraint::Length(3), Constraint::Min(0)])\n        .split(area);\n\n    let header = Paragraph::new(Line::from(vec![\n        Span::styled(\n            \"  🎨  Command Palette\",\n            Style::default()\n                .fg(Color::Magenta)\n                .add_modifier(Modifier::BOLD),\n        ),\n        Span::raw(format!(\n            \"  │  Query: {} │  {} results\",\n            app.palette_query,\n            app.palette_results.len()\n        )),\n    ]))\n    .block(\n        Block::default()\n            .borders(Borders::ALL)\n            .border_style(Style::default().fg(Color::Magenta)),\n    );\n    f.render_widget(header, chunks[0]);\n\n    if app.palette_results.is_empty() {\n        let msg = Paragraph::new(\"  コマンドを入力してください...\")\n            .style(Style::default().fg(Color::DarkGray))\n            .alignment(ratatui::layout::Alignment::Center);\n        f.render_widget(msg, chunks[1]);\n        return;\n    }\n\n    let items: Vec\u003cListItem\u003e = app\n        .palette_results\n        .iter()\n        .enumerate()\n        .map(|(i, (label, _))| {\n            let style = if i == app.palette_selected {\n                Style::default().fg(Color::Black).bg(Color::Magenta)\n            } else {\n                Style::default().fg(Color::White)\n            };\n            ListItem::new(Line::from(Span::styled(format!(\"  {label} \"), style)))\n        })\n        .collect();\n\n    let list = List::new(items).block(\n        Block::default()\n            .title(\" コマンド \")\n            .borders(Borders::ALL)\n            .border_style(Style::default().fg(Color::DarkGray)),\n    );\n    f.r :{"Line":0}},{"line":10181,"address":[],"length":0,"stats":{"Line":0}},{"line":10182,"address":[],"length":0,"stats":{"Line":0}},{"line":10185,"address":[],"length":0,"stats":{"Line":0}},{"line":10188,"address":[],"length":0,"stats":{"Line":0}},{"line":10189,"address":[],"length":0,"stats":{"Line":0}},{"line":10190,"address":[],"length":0,"stats":{"Line":0}},{"line":10192,"address":[],"length":0,"stats":{"Line":0}},{"line":10194,"address":[],"length":0,"stats":{"Line":0}},{"line":10195,"address":[],"length":0,"stats":{"Line":0}},{"line":10197,"address":[],"length":0,"stats":{"Line":0}},{"line":10199,"address":[],"length":0,"stats":{"Line":0}},{"line":10203,"address":[],"length":0,"stats":{"Line":0}},{"line":10204,"address":[],"length":0,"stats":{"Line":0}},{"line":10205,"address":[],"length":0,"stats":{"Line":0}},{"line":10206,"address":[],"length":0,"stats":{"Line":0}},{"line":10208,"address":[],"length":0,"stats":{"Line":0}},{"line":10229,"address":[],"length":0,"stats":{"Line":0}},{"line":10230,"address":[],"length":0,"stats":{"Line":0}},{"line":10232,"address":[],"length":0,"stats":{"Line":0}},{"line":10237,"address":[],"length":0,"stats":{"Line":0}},{"line":10238,"address":[],"length":0,"stats":{"Line":0}},{"line":10240,"address":[],"length":0,"stats":{"Line":0}},{"line":10241,"address":[],"length":0,"stats":{"Line":0}},{"line":10243,"address":[],"length":0,"stats":{"Line":0}},{"line":10244,"address":[],"length":0,"stats":{"Line":0}},{"line":10246,"address":[],"length":0,"stats":{"Line":0}},{"line":10247,"address":[],"length":0,"stats":{"Line":0}},{"line":10248,"address":[],"length":0,"stats":{"Line":0}}],"covered":256,"coverable":5677},{"path":["C:","\\","Drive","Cargo","io","src","ui","components.rs"],"content":"// UI Components - Ferrocopy-inspired components for PixPipe TUI\n// These components provide modern, styled UI elements.\n\n#![allow(dead_code)]\n\nuse ratatui::{\n    layout::Rect,\n    style::{Color, Modifier, Style},\n    text::{Line, Span},\n    widgets::{Block, Borders, Paragraph},\n    Frame,\n};\n\nuse crate::Theme;\n\n// Toast notification types\n#[derive(Debug, Clone, PartialEq)]\npub enum ToastType {\n    Info,\n    Success,\n    Error,\n    Warning,\n}\n\n// Toast notification structure\n#[derive(Debug, Clone)]\npub struct Toast {\n    pub id: u64,\n    pub message: String,\n    pub toast_type: ToastType,\n    pub remaining: f64,\n}\n\nstatic NEXT_TOAST_ID: std::sync::atomic::AtomicU64 = std::sync::atomic::AtomicU64::new(1);\n\nimpl Toast {\n    pub fn new(message: impl Into\u003cString\u003e, toast_type: ToastType) -\u003e Self {\n        let id = NEXT_TOAST_ID.fetch_add(1, std::sync::atomic::Ordering::Relaxed);\n        Self {\n            id,\n            message: message.into(),\n            toast_type,\n            remaining: 5.0,\n        }\n    }\n}\n\n// Button variant styles\n#[derive(Clone, Copy, PartialEq)]\npub enum ButtonVariant {\n    Primary,\n    Secondary,\n    Success,\n    Danger,\n    Ghost,\n}\n\n// Badge variant styles\n#[derive(Clone, Copy, PartialEq)]\npub enum BadgeVariant {\n    Info,\n    Success,\n    Warning,\n    Error,\n    Muted,\n}\n\n// Alert variant styles\n#[derive(Clone, Copy, PartialEq)]\npub enum AlertVariant {\n    Info,\n    Success,\n    Warning,\n    Error,\n}\n\n/// Render a status badge with icon and color\npub fn render_status_badge(status: \u0026str, theme: \u0026Theme) -\u003e Line\u003c'static\u003e {\n    let (icon, color, text) = match status {\n        \"copying\" | \"processing\" =\u003e (\"▶\", theme.accent, \"Processing\"),\n        \"paused\" =\u003e (\"⏸\", theme.warning, \"Paused\"),\n        \"done\" | \"complete\" =\u003e (\"✓\", theme.success, \"Done\"),\n        \"error\" =\u003e (\"✗\", theme.error, \"Error\"),\n        \"scanning\" =\u003e (\"⟳\", theme.primary, \"Scanning\"),\n        _ =\u003e (\" \", theme.muted, \"Ready\"),\n    };\n    Line::from(Span::styled(\n        format!(\" {icon} {text} \"),\n        Style::default().fg(Color::White).bg(color),\n    ))\n}\n\n/// Render a styled button with variant\n#[allow(dead_code)]\npub fn render_button_variant(label: \u0026str, variant: ButtonVariant, theme: \u0026Theme) -\u003e Line\u003c'static\u003e {\n    let (fg, _bg) = match variant {\n        ButtonVariant::Primary =\u003e (Color::White, theme.primary),\n        ButtonVariant::Secondary =\u003e (theme.fg, theme.muted),\n        ButtonVariant::Success =\u003e (Color::White, theme.success),\n        ButtonVariant::Danger =\u003e (Color::White, theme.error),\n        ButtonVariant::Ghost =\u003e (theme.fg, Color::Reset),\n    };\n    Line::from(Span::styled(format!(\" {label} \"), Style::default().fg(fg)))\n}\n\n/// Render a badge with variant\n#[allow(dead_code)]\npub fn render_badge(text: \u0026str, variant: BadgeVariant, theme: \u0026Theme) -\u003e Line\u003c'static\u003e {\n    let color = match variant {\n        BadgeVariant::Info =\u003e theme.primary,\n        BadgeVariant::Success =\u003e theme.success,\n        BadgeVariant::Warning =\u003e theme.warning,\n        BadgeVariant::Error =\u003e theme.error,\n        BadgeVariant::Muted =\u003e theme.muted,\n    };\n    Line::from(Span::styled(\n        format!(\" {text} \"),\n        Style::default().fg(Color::White).bg(color),\n    ))\n}\n\n/// Render an alert box with icon, title, and message\n#[allow(dead_code)]\npub fn render_alert(\n    title: \u0026str,\n    message: \u0026str,\n    variant: AlertVariant,\n    theme: \u0026Theme,\n) -\u003e Vec\u003cLine\u003c'static\u003e\u003e {\n    let (icon, color) = match variant {\n        AlertVariant::Info =\u003e (\"ℹ\", theme.primary),\n        AlertVariant::Success =\u003e (\"✔\", theme.success),\n        AlertVariant::Warning =\u003e (\"⚠\", theme.warning),\n        AlertVariant::Error =\u003e (\"✖\", theme.error),\n    };\n    vec![\n        Line::from(vec![\n            Span::styled(format!(\"  {icon} \"), Style::default().fg(color)),\n            Span::styled(\n                title.to_string(),\n                Style::default().fg(theme.fg).add_modifier(Modifier::BOLD),\n            ),\n        ]),\n        Line::from(Span::styled(\n            format!(\"    {message}\"),\n            Style::default().fg(theme.muted),\n        )),\n    ]\n}\n\n/// Render a section heading with icon\n#[allow(dead_code)]\npub fn render_section_heading(icon: \u0026str, text: \u0026str, theme: \u0026Theme) -\u003e Line\u003c'static\u003e {\n    Line::from(vec![\n        Span::styled(format!(\"{icon} \"), Style::default().fg(theme.accent)),\n        Span::styled(\n            text.to_string(),\n            Style::default().fg(theme.fg).add_modifier(Modifier::BOLD),\n        ),\n    ])\n}\n\n/// Render an empty state placeholder\npub fn render_empty_state(\n    icon: \u0026str,\n    title: \u0026str,\n    message: \u0026str,\n    theme: \u0026Theme,\n) -\u003e Vec\u003cLine\u003c'static\u003e\u003e {\n    vec![\n        Line::from(\"\"),\n        Line::from(Span::styled(\n            format!(\"    {icon}\"),\n            Style::default().fg(theme.muted),\n        )),\n        Line::from(Span::styled(\n            format!(\"    {title}\"),\n            Style::default().fg(theme.fg).add_modifier(Modifier::BOLD),\n        )),\n        Line::from(Span::styled(\n            format!(\"    {message}\"),\n            Style::default().fg(theme.muted),\n        )),\n        Line::from(\"\"),\n    ]\n}\n\n/// Render a card/panel frame with border\n#[allow(dead_code)]\npub fn render_card_frame\u003c'a\u003e(\n    title: \u0026str,\n    content_lines: Vec\u003cLine\u003c'a\u003e\u003e,\n    theme: \u0026Theme,\n) -\u003e Vec\u003cLine\u003c'a\u003e\u003e {\n    let width: usize = 60;\n    let border = \"─\".repeat(width.saturating_sub(2));\n    let mut lines = vec![Line::from(vec![\n        Span::styled(\"┌\", Style::default().fg(theme.muted)),\n        Span::styled(\n            format!(\" {title} \"),\n            Style::default()\n                .fg(theme.accent)\n                .add_modifier(Modifier::BOLD),\n        ),\n        Span::styled(border.clone(), Style::default().fg(theme.muted)),\n    ])];\n    for line in content_lines {\n        let mut new_spans: Vec\u003cSpan\u003c'a\u003e\u003e =\n            vec![Span::styled(\"│ \", Style::default().fg(theme.muted))];\n        for span in line.spans {\n            new_spans.push(span);\n        }\n        lines.push(Line::from(new_spans));\n    }\n    lines.push(Line::from(Span::styled(\n        format!(\"└{}\", \"─\".repeat(width.saturating_sub(1))),\n        Style::default().fg(theme.muted),\n    )));\n    lines\n}\n\n/// Render a file table row with columns\n#[allow(dead_code)]\npub fn render_file_table_row(\n    icon: \u0026str,\n    name: \u0026str,\n    size: \u0026str,\n    progress: f64,\n    status: \u0026str,\n    theme: \u0026Theme,\n) -\u003e Line\u003c'static\u003e {\n    let status_color = match status {\n        \"Done\" =\u003e theme.success,\n        \"Copying\" | \"Processing\" =\u003e theme.accent,\n        \"Error\" =\u003e theme.error,\n        _ =\u003e theme.muted,\n    };\n    let bar = make_gauge_bar(progress, 10);\n    Line::from(vec![\n        Span::styled(format!(\"{icon} \"), Style::default().fg(theme.accent)),\n        Span::styled(\n            format!(\"{:\u003c30}\", truncate_str(name, 30)),\n            Style::default().fg(theme.fg),\n        ),\n        Span::styled(format!(\"{size:\u003e10}\"), Style::default().fg(theme.muted)),\n        Span::styled(format!(\" [{bar}]\"), Style::default().fg(theme.primary)),\n        Span::styled(\n            format!(\" {:\u003e5.1}%\", progress * 100.0),\n            Style::default().fg(theme.accent),\n        ),\n        Span::styled(format!(\" {status}\"), Style::default().fg(status_color)),\n    ])\n}\n\n/// Render enhanced progress display with speed, ETA, elapsed\n#[allow(dead_code, clippy::too_many_arguments)]\npub fn render_progress_detail(\n    progress: f64,\n    speed: \u0026str,\n    eta: \u0026str,\n    elapsed: \u0026str,\n    files_done: usize,\n    total_files: usize,\n    current_file: \u0026str,\n    theme: \u0026Theme,\n) -\u003e Vec\u003cLine\u003c'static\u003e\u003e {\n    let bar = make_gauge_bar(progress, 40);\n    vec![\n        Line::from(vec![\n            Span::styled(\"  \", Style::default()),\n            Span::styled(\n                format!(\"{:\u003e5.1}%\", progress * 100.0),\n                Style::default()\n                    .fg(theme.accent)\n                    .add_modifier(Modifier::BOLD),\n            ),\n            Span::styled(format!(\" [{bar}]\"), Style::default().fg(theme.primary)),\n        ]),\n        Line::from(vec![\n            Span::styled(\"  \", Style::default()),\n            Span::styled(format!(\"Speed: {speed}\"), Style::default().fg(theme.fg)),\n            Span::styled(\"  │  \", Style::default().fg(theme.muted)),\n            Span::styled(format!(\"ETA: {eta}\"), Style::default().fg(theme.fg)),\n            Span::styled(\"  │  \", Style::default().fg(theme.muted)),\n            Span::styled(format!(\"Elapsed: {elapsed}\"), Style::default().fg(theme.fg)),\n        ]),\n        Line::from(vec![\n            Span::styled(\"  \", Style::default()),\n            Span::styled(\n                format!(\"Files: {files_done}/{total_files}\"),\n                Style::default().fg(theme.muted),\n            ),\n        ]),\n        Line::from(vec![\n            Span::styled(\"  \", Style::default()),\n            Span::styled(\n                format!(\"Current: {}\", truncate_str(current_file, 50)),\n                Style::default().fg(theme.muted),\n            ),\n        ]),\n    ]\n}\n\n/// Render toast overlay (top-right corner)\npub fn render_toasts(toasts: \u0026[Toast], area: Rect, f: \u0026mut Frame, theme: \u0026Theme) {\n    let max_toasts = 3;\n    let toast_width = 40.min(area.width.saturating_sub(2) as usize);\n    let start_y = area.y + 1;\n\n    for (i, toast) in toasts.iter().take(max_toasts).enumerate() {\n        let y = start_y + i as u16 * 3;\n        if y + 2 \u003e area.y + area.height {\n            break;\n        }\n        let x = area.x + area.width.saturating_sub(toast_width as u16 + 2);\n        let toast_area = Rect::new(x, y, toast_width as u16 + 2, 2);\n\n        let (icon, color) = match toast.toast_type {\n            ToastType::Info =\u003e (\"ℹ\", theme.primary),\n            ToastType::Success =\u003e (\"✔\", theme.success),\n            ToastType::Error =\u003e (\"✖\", theme.error),\n            ToastType::Warning =\u003e (\"⚠\", theme.warning),\n        };\n\n        let toast_block = Paragraph::new(Line::from(vec![\n            Span::styled(format!(\"{icon} \"), Style::default().fg(color)),\n            Span::styled(\n                truncate_str(\u0026toast.message, toast_width.saturating_sub(4)),\n                Style::default().fg(theme.fg),\n            ),\n        ]))\n        .block(\n            Block::default()\n                .borders(Borders::ALL)\n                .border_style(Style::default().fg(color)),\n        );\n        f.render_widget(toast_block, toast_area);\n    }\n}\n\n/// Truncate string to max length with ellipsis (UTF-8 safe)\npub fn truncate_str(s: \u0026str, max_len: usize) -\u003e String {\n    if s.len() \u003c= max_len {\n        s.to_string()\n    } else {\n        let trunc = max_len.saturating_sub(3);\n        // Find a valid char boundary at or before trunc\n        let end = if trunc \u003e= s.len() {\n            s.len()\n        } else {\n            let mut boundary = trunc;\n            while boundary \u003e 0 \u0026\u0026 !s.is_char_boundary(boundary) {\n                boundary -= 1;\n            }\n            boundary\n        };\n        format!(\"{}...\", \u0026s[..end])\n    }\n}\n\n// Animated gauge characters\nconst GAUGE_CHARS: \u0026[char] = \u0026['░', '▒', '▓', '█'];\npub const SPINNER_CHARS: \u0026[char] = \u0026['⠋', '⠙', '⠹', '⠸', '⠼', '⠴', '⠦', '⠧', '⠇', '⠏'];\n\n/// Create a gauge bar string\npub fn make_gauge_bar(ratio: f64, width: usize) -\u003e String {\n    let filled = (ratio * width as f64) as usize;\n    let empty = width.saturating_sub(filled);\n    let partial = ((ratio * width as f64) - filled as f64) * 4.0;\n    let partial_idx = partial as usize;\n\n    let mut bar = String::new();\n    for _ in 0..filled {\n        bar.push('█');\n    }\n    if filled \u003c width \u0026\u0026 partial_idx \u003e 0 {\n        bar.push(GAUGE_CHARS[partial_idx.min(3)]);\n    }\n    for _ in 0..empty.saturating_sub(usize::from(partial_idx \u003e 0)) {\n        bar.push('░');\n    }\n    bar\n}\n\n/// Format file size to human readable string\npub fn format_size(bytes: u64) -\u003e String {\n    if bytes \u003e= 1_073_741_824 {\n        format!(\"{:.1} GB\", bytes as f64 / 1_073_741_824.0)\n    } else if bytes \u003e= 1_048_576 {\n        format!(\"{:.1} MB\", bytes as f64 / 1_048_576.0)\n    } else if bytes \u003e= 1024 {\n        format!(\"{:.1} KB\", bytes as f64 / 1024.0)\n    } else {\n        format!(\"{bytes} B\")\n    }\n}\n\n/// Format duration in seconds to human readable string\npub fn format_duration(secs: f64) -\u003e String {\n    if secs \u003e= 3600.0 {\n        let h = (secs / 3600.0) as u64;\n        let m = ((secs % 3600.0) / 60.0) as u64;\n        let s = (secs % 60.0) as u64;\n        format!(\"{h}h{m}m{s}s\")\n    } else if secs \u003e= 60.0 {\n        let m = (secs / 60.0) as u64;\n        let s = (secs % 60.0) as u64;\n        format!(\"{m}m{s}s\")\n    } else {\n        format!(\"{secs:.1}s\")\n    }\n}\n","traces":[{"line":37,"address":[],"length":0,"stats":{"Line":0}},{"line":38,"address":[],"length":0,"stats":{"Line":0}},{"line":41,"address":[],"length":0,"stats":{"Line":0}},{"line":78,"address":[],"length":0,"stats":{"Line":0}},{"line":79,"address":[],"length":0,"stats":{"Line":0}},{"line":80,"address":[],"length":0,"stats":{"Line":0}},{"line":81,"address":[],"length":0,"stats":{"Line":0}},{"line":82,"address":[],"lengt     <script>const e = React.createElement;

function pathToString(path) {
  if (path[0] === '/') {
    return '/' + path.slice(1).join('/');
  } else {
    return path.join('/');
  }
}

function findCommonPath(files) {
  if (!files || !files.length) {
    return [];
  }

  function isPrefix(arr, prefix) {
    if (arr.length < prefix.length) {
      return false;
    }
    for (let i = prefix.length - 1; i >= 0; --i) {
      if (arr[i] !== prefix[i]) {
        return false;
      }
    }
    return true;
  }

  let commonPath = files[0].path.slice(0, -1);
  while (commonPath.length) {
    if (files.every(file => isPrefix(file.path, commonPath))) {
      break;
    }
    commonPath.pop();
  }
  return commonPath;
}

function findFolders(files) {
  if (!files || !files.length) {
    return [];
  }

  let folders = files.filter(file => file.path.length > 1).map(file => file.path[0]);
  folders = [...new Set(folders)]; // unique
  folders.sort();

  folders = folders.map(folder => {
    let filesInFolder = files
      .filter(file => file.path[0] === folder)
      .map(file => ({
        ...file,
        path: file.path.slice(1),
        parent: [...file.parent, file.path[0]],
      }));

    const children = findFolders(filesInFolder); // recursion

    return {
      is_folder: true,
      path: [folder],
      parent: files[0].parent,
      children,
      covered: children.reduce((sum, file) => sum + file.covered, 0),
      coverable: children.reduce((sum, file) => sum + file.coverable, 0),
      prevRun: {
        covered: children.reduce((sum, file) => sum + file.prevRun.covered, 0),
        coverable: children.reduce((sum, file) => sum + file.prevRun.coverable, 0),
      },
    };
  });

  return [...folders, ...files.filter(file => file.path.length === 1)];
}

class App extends React.Component {
  constructor(...args) {
    super(...args);

    this.state = {
      current: [],
    };
  }

  componentDidMount() {
    this.updateStateFromLocation();
    window.addEventListener('hashchange', () => this.updateStateFromLocation(), false);
  }

  updateStateFromLocation() {
    if (window.location.hash.length > 1) {
      const current = window.location.hash.slice(1).split('/').map(decodeURIComponent);
      this.setState({current});
    } else {
      this.setState({current: []});
    }
  }

  getCurrentPath() {
    let file = this.props.root;
    let path = [file];
    for (let p of this.state.current) {
      file = file.children.find(file => file.path[0] === p);
      if (!file) {
        return path;
      }
      path.push(file);
    }
    return path;
  }

  render() {
    const path = this.getCurrentPath();
    const file = path[path.length - 1];

    let w = null;
    if (file.is_folder) {
      w = e(FilesList, {
        folder: file,
        onSelectFile: this.selectFile.bind(this),
        onBack: path.length > 1 ? this.back.bind(this) : null,
      });
    } else {
      w = e(DisplayFile, {
        file,
        onBack: this.back.bind(this),
      });
    }

    return e('div', {className: 'app'}, w);
  }

  selectFile(file) {
    this.setState(
      ({current}) => {
        return {current: [...current, file.path[0]]};
      },
      () => this.updateHash(),
    );
  }

  back(file) {
    this.setState(
      ({current}) => {
        return {current: current.slice(0, current.length - 1)};
      },
      () => this.updateHash(),
    );
  }

  updateHash() {
    if (!this.state.current || !this.state.current.length) {
      window.location = '#';
    } else {
      window.location = '#' + this.state.current.join('/');
    }
  }
}

function FilesList({folder, onSelectFile, onBack}) {
  let files = folder.children;
  return e(
    'div',
    {className: 'display-folder'},
    e(FileHeader, {file: folder, onBack}),
    e(
      'table',
      {className: 'files-list'},
      e('thead', {className: 'files-list__head'}, e('tr', null, e('th', null, 'Path'), e('th', null, 'Coverage'))),
      e(
        'tbody',
        {className: 'files-list__body'},
        files.map(file => e(File, {file, onClick: onSelectFile})),
      ),
    ),
  );
}

function File({file, onClick}) {
  const coverage = file.coverable ? (file.covered / file.coverable) * 100 : -1;
  const coverageDelta =
    file.prevRun && (file.covered / file.coverable) * 100 - (file.prevRun.covered / file.prevRun.coverable) * 100;

  return e(
    'tr',
    {
      className:
        'files-list__file' +
        (coverage >= 0 && coverage < 50 ? ' files-list__file_low' : '') +
        (coverage >= 50 && coverage < 80 ? ' files-list__file_medium' : '') +
        (coverage >= 80 ? ' files-list__file_high' : '') +
        (file.is_folder ? ' files-list__file_folder' : ''),
      onClick: () => onClick(file),
    },
    e('td', null, e('a', null, pathToString(file.path))),
    e(
      'td',
      null,
      file.covered + ' / ' + file.coverable + (coverage >= 0 ? ' (' + coverage.toFixed(2) + '%)' : ''),
      e(
        'span',
        {title: 'Change from the previous run'},
        coverageDelta ? ` (${coverageDelta > 0 ? '+' : ''}${coverageDelta.toFixed(2)}%)` : '',
      ),
    ),
  );
}

function DisplayFile({file, onBack}) {
  return e('div', {className: 'display-file'}, e(FileHeader, {file, onBack}), e(FileContent, {file}));
}

function FileHeader({file, onBack}) {
  const coverage = (file.covered / file.coverable) * 100;
  const coverageDelta = file.prevRun && coverage - (file.prevRun.covered / file.prevRun.coverable) * 100;

  return e(
    'div',
    {className: 'file-header'},
    onBack ? e('a', {className: 'file-header__back', onClick: onBack}, 'Back') : null,
    e('div', {className: 'file-header__name'}, pathToString([...file.parent, ...file.path])),
    e(
      'div',
      {className: 'file-header__stat'},
      'Covered: ' + file.covered + ' of ' + file.coverable + (file.coverable ? ' (' + coverage.toFixed(2) + '%)' : ''),
      e(
        'span',
        {title: 'Change from the previous run'},
        coverageDelta ? ` (${coverageDelta > 0 ? '+' : ''}${coverageDelta.toFixed(2)}%)` : '',
      ),
      e('input', {id: 'theme-toggle', type: 'checkbox', hidden: true}),
      e('label', {for: 'theme-toggle', id: 'theme-toggle-label'}, '🌙'),
    ),
  );
}

function FileContent({file}) {
  return e(
    'pre',
    {className: 'file-content'},
    file.content.split(/\r?\n/).map((line, index) => {
      const trace = file.traces.find(trace => trace.line === index + 1);
      const covered = trace && trace.stats.Line;
      const uncovered = trace && !trace.stats.Line;
      const nbHit = covered? trace.stats.Line: 0;
      return e(
        'div',
        { className: 'code-text-container' },
        e(
          'code',
          {
            className: 'code-line' + (covered ? ' code-line_covered' : '') + (uncovered ? ' code-line_uncovered' : ''),
          },
          line
        ),
        e(
          'div',
          { className: 'cover-indicator' + (covered? ' check-cover': '') + (uncovered? ' no-cover': '')},
          e(
            'div',
            { className: (covered? 'stat-line-hit': '')},
            covered? nbHit: ""
          )
        )
      );
    }),
  );
}

(function () {
  const commonPath = findCommonPath(data.files);
  const prevFilesMap = new Map();

  previousData &&
    previousData.files.forEach(file => {
      const path = file.path.slice(commonPath.length).join('/');
      prevFilesMap.set(path, file);
    });

  const files = data.files.map(file => {
    const path = file.path.slice(commonPath.length);
    const {covered = 0, coverable = 0} = prevFilesMap.get(path.join('/')) || {};
    return {
      ...file,
      path,
      parent: commonPath,
      prevRun: {covered, coverable},
    };
  });

  const children = findFolders(files);

  const root = {
    is_folder: true,
    children,
    path: commonPath,
    parent: [],
    covered: children.reduce((sum, file) => sum + file.covered, 0),
    coverable: children.reduce((sum, file) => sum + file.coverable, 0),
    prevRun: {
      covered: children.reduce((sum, file) => sum + file.prevRun.covered, 0),
      coverable: children.reduce((sum, file) => sum + file.prevRun.coverable, 0),
    },
  };

  if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }

  ReactDOM.render(e(App, {root, prevFilesMap}), document.getElementById('root'));

  const toggle = document.getElementById('theme-toggle');
  const label = document.getElementById('theme-toggle-label');
  label.textContent = '🌙';

  toggle.addEventListener('change', () => {
    if (toggle.checked) {
      document.documentElement.setAttribute('data-theme', 'dark');
      label.textContent = '☀️';
    } else {
      document.documentElement.removeAttribute('data-theme');
      label.textContent = '🌙';
    }
  });
})();
</script>
