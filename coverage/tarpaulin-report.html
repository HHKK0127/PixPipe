<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <style>:root {
  --color: black;
  --bg: white;
  --head-bg: white;
  --link: #338;

  --blue: #ccf;
  --red: #fcc;
  --yellow: #ffc;
  --green: #cfc;
}

[data-theme='dark'] {
  --color: white;
  --bg: black;
  --head-bg: #333;
  --link: #aaf;

  --blue: #225;
  --red: #522;
  --yellow: #552;
  --green: #252;
}

html,
body {
  margin: 0;
  padding: 0;
  color: var(--color);
  background: var(--bg);
}

.app {
  margin: 10px;
  padding: 0;
}

.files-list {
  margin: 10px 0 0;
  width: 100%;
  border-collapse: collapse;
}
.files-list__head {
  border: 1px solid #999;
}
.files-list__head > tr > th {
  padding: 10px;
  border: 1px solid #999;
  text-align: left;
  font-weight: normal;
  background: var(--head-bg);
}
.files-list__body {
}
.files-list__file {
  cursor: pointer;
}
.files-list__file:hover {
  background: var(--blue);
}
.files-list__file > td {
  padding: 10px;
  border: 1px solid #999;
}
.files-list__file > td:first-child::before {
  content: '\01F4C4';
  margin-right: 1em;
}
.files-list__file_low {
  background: var(--red);
}
.files-list__file_medium {
  background: var(--yellow);
}
.files-list__file_high {
  background: var(--green);
}
.files-list__file_folder > td:first-child::before {
  content: '\01F4C1';
  margin-right: 1em;
}

.file-header {
  border: 1px solid #999;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  background: var(--bg);
}

.file-header__back {
  margin: 10px;
  cursor: pointer;
  flex-shrink: 0;
  flex-grow: 0;
  text-decoration: underline;
  color: var(--link);
}

.file-header__name {
  margin: 10px;
  flex-shrink: 2;
  flex-grow: 2;
}

.file-header__stat {
  margin: 10px;
  flex-shrink: 0;
  flex-grow: 0;
}

.file-content {
  margin: 10px 0 0;
  border: 1px solid #999;
  padding: 10px;
  counter-reset: line;
  display: flex;
  flex-direction: column;
}

.code-line::before {
  content: counter(line);
  margin-right: 72px;
}
.code-line {
  margin: 0;
  height: 1em;
  counter-increment: line;

  position: absolute;
  padding: 0 0.3em 0.3em 0.3em;
  display: inherit;
  width: 100%;
}
.code-line_covered {
  background: var(--green);
}
.code-line_uncovered {
  background: var(--red);
}

.code-text-container {
  position: relative;
  height: 1em;
  padding: 0.3em 0;
}

.cover-indicator {
  display: flex;
  width: 100%;
  position: absolute;
  justify-content: end;
  height: 1em;
  align-items: center;
  padding: 0 0.3em 0.3em 0.3em;
}

.cover-indicator.check-cover::after {
  content: "\2713";
  font-weight: bold;
  background-color: var(--green);
  height: 1em;
}

.cover-indicator.no-cover::after {
  content: "\2716";
  font-weight: bold;
  background-color: var(--red);
  height: 1em;
}

.stat-line-hit {
  max-width: 48px;
  overflow: hidden;
  font-weight: bold;
  margin-right: 4px;
  background-color: var(--green);
  position: relative;
  top: 0.1em;
}

#theme-toggle-label {
  margin-left: 1ch;
}
</style>
</head>

c_read != dst_read || src_buf[..src_read] != dst_buf[..dst_read] {\n            return Err(anyhow!(\"File verification failed for {}\", dst.display()));\n        }\n\n        if src_read == 0 {\n            break;\n        }\n    }\n\n    Ok(bytes)\n}\n\n/// Move file with verification\npub fn move_file_verified(src: \u0026Path, dst: \u0026Path) -\u003e Result\u003cu64\u003e {\n    use std::fs;\n\n    // Try rename first (atomic on same filesystem)\n    if let Ok(()) = fs::rename(src, dst) {\n        let metadata = fs::metadata(dst)?;\n        Ok(metadata.len())\n    } else {\n        // Cross-filesystem: copy + delete\n        let bytes = copy_file_verified(src, dst)?;\n        fs::remove_file(src)?;\n        Ok(bytes)\n    }\n}\n\n/// Create directory if it doesn't exist\npub fn ensure_dir(path: \u0026Path) -\u003e Result\u003c()\u003e {\n    use std::fs;\n\n    if !path.exists() {\n        fs::create_dir_all(path)?;\n    }\n    Ok(())\n}\n\n/// List files in directory with optional extension filter\npub fn list_files(dir: \u0026Path, extensions: Option\u003c\u0026[\u0026str]\u003e) -\u003e Result\u003cVec\u003cPathBuf\u003e\u003e {\n    use std::fs;\n\n    if !dir.is_dir() {\n        return Err(anyhow!(\"{} is not a directory\", dir.display()));\n    }\n\n    let mut files = Vec::new();\n    for entry in fs::read_dir(dir)? {\n        let entry = entry?;\n        let path = entry.path();\n\n        if path.is_file() {\n            if let Some(exts) = extensions {\n                if let Some(ext) = path.extension() {\n                    let ext_str = ext.to_string_lossy().to_lowercase();\n                    if exts.iter().any(|e| e.to_lowercase() == ext_str) {\n                        files.push(path);\n                    }\n                }\n            } else {\n                files.push(path);\n            }\n        }\n    }\n\n    Ok(files)\n}\n\n/// Get file size in bytes\npub fn file_size(path: \u0026Path) -\u003e Result\u003cu64\u003e {\n    use std::fs;\n\n    let metadata = fs::metadata(path)?;\n    Ok(metadata.len())\n}\n\n/// Format file size as human-readable string\npub fn format_size(bytes: u64) -\u003e String {\n    const KB: u64 = 1024;\n    const MB: u64 = KB * 1024;\n    const GB: u64 = MB * 1024;\n    const TB: u64 = GB * 1024;\n\n    if bytes \u003e= TB {\n        format!(\"{:.2} TB\", bytes as f64 / TB as f64)\n    } else if bytes \u003e= GB {\n        format!(\"{:.2} GB\", bytes as f64 / GB as f64)\n    } else if bytes \u003e= MB {\n        format!(\"{:.2} MB\", bytes as f64 / MB as f64)\n    } else if bytes \u003e= KB {\n        format!(\"{:.2} KB\", bytes as f64 / KB as f64)\n    } else {\n        format!(\"{bytes} B\")\n    }\n}\n\n/// Format duration as human-readable string\npub fn format_duration(ms: u64) -\u003e String {\n    if ms \u003c 1000 {\n        format!(\"{ms}ms\")\n    } else if ms \u003c 60_000 {\n        format!(\"{:.1}s\", ms as f64 / 1000.0)\n    } else {\n        let mins = ms / 60_000;\n        let secs = (ms % 60_000) / 1000;\n        format!(\"{mins}m {secs}s\")\n    }\n}\n\n/// Sanitize filename for safe filesystem use\npub fn sanitize_filename(name: \u0026str) -\u003e String {\n    let invalid_chars = ['/', '\\\\', ':', '*', '?', '\"', '\u003c', '\u003e', '|'];\n    let mut result = String::new();\n\n    for ch in name.chars() {\n        if invalid_chars.contains(\u0026ch) {\n            result.push('_');\n        } else {\n            result.push(ch);\n        }\n    }\n\n    // Trim trailing spaces and dots (Windows)\n    let trimmed = result.trim_end_matches([' ', '.']);\n    trimmed.to_string()\n}\n\n/// Get unique file path (add number suffix if exists)\npub fn unique_path(path: \u0026Path) -\u003e PathBuf {\n    if !path.exists() {\n        return path.to_path_buf();\n    }\n\n    let parent = safe_parent(path);\n    let stem = safe_file_stem(path);\n    let ext = safe_extension(path);\n\n    let mut counter = 1;\n    loop {\n        let new_name = if ext.is_empty() {\n            format!(\"{stem} ({counter})\")\n        } else {\n            format!(\"{stem} ({counter}).{ext}\")\n        };\n\n        let new_path = parent.join(\u0026new_name);\n        if !new_path.exists() {\n            return new_path;\n        }\n        counter += 1;\n    }\n}\n\n/// Check if path is an image file\npub fn is_image_file(path: \u0026Path) -\u003e bool {\n    let image_extensions = [\n        \"jpg\", \"jpeg\", \"png\", \"gif\", \"bmp\", \"tiff\", \"tif\", \"webp\", \"avif\", \"ico\", \"svg\", \"heic\",\n        \"heif\", \"jxl\", \"j2k\", \"jp2\", \"raw\", \"cr2\", \"nef\", \"arw\", \"dng\", \"rw2\", \"orf\", \"srw\", \"pef\",\n        \"raf\",\n    ];\n\n    if let Some(ext) = path.extension() {\n        let ext_str = ext.to_string_lossy().to_lowercase();\n        image_extensions.contains(\u0026ext_str.as_str())\n    } else {\n        false\n    }\n}\n\n/// Get MIME type for file\npub fn mime_type(path: \u0026Path) -\u003e \u0026'static str {\n    if let Some(ext) = path.extension() {\n        match ext.to_string_lossy().to_lowercase().as_str() {\n            \"jpg\" | \"jpeg\" =\u003e \"image/jpeg\",\n            \"png\" =\u003e \"image/png\",\n            \"gif\" =\u003e \"image/gif\",\n            \"bmp\" =\u003e \"image/bmp\",\n            \"tiff\" | \"tif\" =\u003e \"image/tiff\",\n            \"webp\" =\u003e \"image/webp\",\n            \"avif\" =\u003e \"image/avif\",\n            \"svg\" =\u003e \"image/svg+xml\",\n            \"ico\" =\u003e \"image/x-icon\",\n            \"heic\" | \"heif\" =\u003e \"image/heif\",\n            \"jxl\" =\u003e \"image/jxl\",\n            _ =\u003e \"application/octet-stream\",\n        }\n    } else {\n        \"application/octet-stream\"\n    }\n}\n","traces":[{"line":10,"address":[],"length":0,"stats":{"Line":0}},{"line":11,"address":[],"length":0,"stats":{"Line":0}},{"line":18,"address":[],"length":0,"stats":{"Line":0}},{"line":19,"address":[],"length":0,"stats":{"Line":0}},{"line":26,"add },{"line":241,"address":[],"length":0,"stats":{"Line":0}},{"line":242,"address":[],"length":0,"stats":{"Line":0}},{"line":243,"address":[],"length":0,"stats":{"Line":0}},{"line":244,"address":[],"length":0,"stats":{"Line":0}},{"line":245,"address":[],"length":0,"stats":{"Line":0}},{"line":246,"address":[],"length":0,"stats":{"Line":0}},{"line":249,"address":[],"length":0,"stats":{"Line":0}}],"covered":0,"coverable":119},{"path":["C:","\\","Drive","Cargo","io","src","core_mod","hash.rs"],"content":"// Hash Module - Hashing and deduplication for PixPipe\n// This module contains all hash computation and duplicate detection logic.\n\n#![allow(dead_code)]\n\nuse anyhow::Result;\nuse std::collections::HashMap;\nuse std::path::{Path, PathBuf};\n\n/// Compute hash for a file\npub fn compute_hash(path: \u0026Path, algorithm: \u0026str) -\u003e Result\u003cString\u003e {\n    use std::fs::File;\n    use std::io::Read;\n\n    let mut file = File::open(path)?;\n    let mut buffer = Vec::new();\n    file.read_to_end(\u0026mut buffer)?;\n\n    match algorithm {\n        \"sha256\" =\u003e {\n            use sha2::{Digest, Sha256};\n            let mut hasher = Sha256::new();\n            hasher.update(\u0026buffer);\n            Ok(format!(\"{:x}\", hasher.finalize()))\n        }\n        \"sha512\" =\u003e {\n            use sha2::{Digest, Sha512};\n            let mut hasher = Sha512::new();\n            hasher.update(\u0026buffer);\n            Ok(format!(\"{:x}\", hasher.finalize()))\n        }\n        \"blake3\" =\u003e {\n            let hash = blake3::hash(\u0026buffer);\n            Ok(hash.to_hex().to_string())\n        }\n        \"xxh3\" =\u003e {\n            use xxhash_rust::xxh3::xxh3_64;\n            let hash = xxh3_64(\u0026buffer);\n            Ok(format!(\"{hash:016x}\"))\n        }\n        _ =\u003e {\n            use sha2::{Digest, Sha256};\n            let mut hasher = Sha256::new();\n            hasher.update(\u0026buffer);\n            Ok(format!(\"{:x}\", hasher.finalize()))\n        }\n    }\n}\n\n/// Compute perceptual hash for image similarity detection\npub fn compute_phash(path: \u0026Path) -\u003e Result\u003cu64\u003e {\n    // Simple perceptual hash using image resize + average\n    // For real implementation, would use img_hash or similar crate\n    use std::fs::File;\n    use std::io::Read;\n\n    let mut file = File::open(path)?;\n    let mut buffer = Vec::new();\n    file.read_to_end(\u0026mut buffer)?;\n\n    // Simple hash based on file content (placeholder)\n    // Real implementation would:\n    // 1. Decode image\n    // 2. Resize to 8x8\n    // 3. Convert to grayscale\n    // 4. Compute DCT\n    // 5. Generate 64-bit hash\n    use sha2::{Digest, Sha256};\n    let mut hasher = Sha256::new();\n    hasher.update(\u0026buffer);\n    let result = hasher.finalize();\n\n    let mut hash = 0u64;\n    for i in 0..8 {\n        hash = (hash \u003c\u003c 8) | u64::from(result[i]);\n    }\n\n    Ok(hash)\n}\n\n/// Compute Hamming distance between two perceptual hashes\npub fn phash_distance(hash1: u64, hash2: u64) -\u003e u32 {\n    (hash1 ^ hash2).count_ones()\n}\n\n/// Find duplicate files by hash\npub fn find_duplicates(files: \u0026[(String, String)]) -\u003e HashMap\u003cString, Vec\u003cString\u003e\u003e {\n    let mut hash_map: HashMap\u003cString, Vec\u003cString\u003e\u003e = HashMap::new();\n\n    for (path, hash) in files {\n        hash_map.entry(hash.clone()).or_default().push(path.clone());\n    }\n\n    // Filter to only groups with more than one file\n    hash_map\n        .into_iter()\n        .filter(|(_, paths)| paths.len() \u003e 1)\n        .collect()\n}\n\n/// Find similar images by perceptual hash distance\npub fn find_similar_images(files: \u0026[(String, u64)], threshold: u32) -\u003e Vec\u003c(String, String, u32)\u003e {\n    let mut similar = Vec::new();\n\n    for i in 0..files.len() {\n        for j in (i + 1)..files.len() {\n            let distance = phash_distance(files[i].1, files[j].1);\n            if distance \u003c= threshold {\n                similar.push((files[i].0.clone(), files[j].0.clone(), distance));\n            }\n        }\n    }\n\n    similar.sort_by_key(|\u0026(_, _, d)| d);\n    similar\n}\n\n/// Compute hash for directory (hash of all file hashes)\npub fn compute_dir_hash(dir: \u0026Path, algorithm: \u0026str) -\u003e Result\u003cString\u003e {\n    use sha2::{Digest, Sha256};\n    use std::fs;\n\n    let mut hasher = Sha256::new();\n    let mut entries: Vec\u003c_\u003e = fs::read_dir(dir)?\n        .filter_map(std::result::Result::ok)\n        .collect();\n\n    // Sort for deterministic hash\n    entries.sort_by_key(std::fs::DirEntry::path);\n\n    for entry in entries {\n        let path = entry.path();\n        if path.is_file() {\n            let file_hash = compute_hash(\u0026path, algorithm)?;\n            hasher.update(file_hash.as_bytes());\n        } else if path.is_dir() {\n            let dir_hash = compute_dir_hash(\u0026path, algorithm)?;\n            hasher.update(dir_hash.as_bytes());\n        }\n    }\n\n    Ok(format!(\"{:x}\", hasher.finalize()))\n}\n\n/// Verify file integrity against expected hash\npub fn verify_hash(path: \u0026Path, expected: \u0026str, algorithm: \u0026str) -\u003e Result\u003cbool\u003e {\n    let actual = compute_hash(path, algorithm)?;\n    Ok(actual == expected)\n}\n\n/// Batch hash computation with progress callback\npub fn batch_hash(\n    files: \u0026[PathBuf],\n    algorithm: \u0026str,\n    mut on_progress: impl FnMut(usize, usize),\n) -\u003e Result\u003cVec\u003c(String, String)\u003e\u003e {\n    let mut results = Vec::new();\n    let total = files.len();\n\n    for (i, path) in files.iter().enumerate() {\n        let hash = compute_hash(path, algorithm)?;\n        results.push((path.to_string_lossy().to_string(), hash));\n        on_progress(i + 1, total);\n    }\n\n    Ok(results)\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use std::fs;\n    use std::io::Write;\n\n    #[test]\n    fn test_compute_hash_sha256() {\n        let temp = Path::new(\"test_hash.txt\");\n        fs::write(temp, \"hello world\").unwrap();\n\n        let hash = compute_hash(temp, \"sha256\").unwrap();\n        assert!(!hash.is_empty());\n        assert_eq!(hash.len(), 64); // SHA256 hex is 64 chars\n\n        fs::remove_file(temp).unwrap();\n    }\n\n    #[test]\n    fn test_phash_distance() {\n        let hash1 = 0b1010_1010_1010_1010;\n        let hash2 = 0b1010_1010_1010_1011;\n        assert_eq!(phash_distance(hash1, hash2), 1);\n\n        let hash3 = 0b0101_0101_0101_0101;\n        assert_eq!(phash_distance(hash1, hash3), 16);\n    }\n\n    #[test]\n    fn test_find_duplicates() {\n        let files = vec![\n            (\"a.jpg\".to_string(), \"hash1\".to_string()),\n            (\"b.jpg\".to_string(), \"hash1\".to_string()),\n            (\"c.jpg\".to_string(), \"hash2\".to_string()),\n        ];\n\n        let dupes = find_duplicates(\u0026files);\n        assert_eq!(dupes.len(), 1);\n        assert_eq!(dupes[\"hash1\"].len(), 2);\n    }\n}\n","traces":[{"line":11,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":15,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":16,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":17,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":19,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":20,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":22,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":23,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":24,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":26,"address":[],"length":0,"stats":{"Line":0}},{"line":28,"address":[],"length":0,"stats":{"Line":0}},{"line":29,"address":[],"length":0,"stats":{"Line":0}},{"line":30,"address":[],"length":0,"stats":{"Line":0}},{"line":32,"address":[],"le nsion, safe_file_name, safe_file_stem, safe_lock, safe_parent,\n};\n\nuse anyhow::{Context, Result};\nuse chrono::Utc;\nuse crossterm::{\n    event::{\n        self, DisableMouseCapture, EnableMouseCapture, Event, KeyCode, KeyEventKind, KeyModifiers,\n    },\n    execute,\n    terminal::{disable_raw_mode, enable_raw_mode, EnterAlternateScreen, LeaveAlternateScreen},\n};\nuse image::GenericImageView;\nuse log::{error, info};\nuse ratatui::{\n    backend::CrosstermBackend,\n    layout::{Constraint, Direction, Layout, Rect},\n    style::{Color, Modifier, Style},\n    text::{Line, Span},\n    widgets::{BarChart, Block, Borders, Gauge, List, ListItem, Paragraph},\n    Frame, Terminal,\n};\nuse rayon::prelude::*;\nuse serde::{Deserialize, Serialize};\nuse sha2::{Digest, Sha256};\nuse std::collections::{HashMap, HashSet};\nuse std::fs;\nuse std::io::{self, BufReader, Read, Write};\nuse std::path::{Path, PathBuf};\nuse std::process::Command;\nuse std::sync::{Arc, Mutex};\nuse std::thread;\nuse std::time::{Duration, Instant};\nuse sysinfo::System;\nuse walkdir::WalkDir;\n\n// ============================================================\n// Constants\n// ============================================================\n\nconst BUFFER_SIZE: usize = 65536;\n\nconst DEFAULT_IMAGE_EXTENSIONS: \u0026[\u0026str] = \u0026[\n    \".jxl\", \".jpg\", \".jpeg\", \".png\", \".gif\", \".bmp\", \".webp\", \".heic\", \".heif\", \".cr2\", \".nef\",\n    \".arw\", \".tiff\", \".tif\",\n];\n\nconst FULL_STEP_LABELS: \u0026[\u0026str] = \u0026[\n    \"STEP 1: Move files (Twitter \u0026 Downloads)\",\n    \"STEP 2: Remove duplicates (SHA256)\",\n    \"STEP 3: Remove files in reference folder\",\n    \"STEP 4: Rename by timestamp + clean names\",\n    \"STEP 5: Convert to JXL\",\n];\n\nconst THEME_NAMES: \u0026[\u0026str] = \u0026[\n    \"Cyan\",\n    \"Green\",\n    \"Magenta\",\n    \"Yellow\",\n    \"Blue\",\n    \"Red\",\n    \"Solarized\",\n    \"Dracula\",\n    \"Nord\",\n    \"Monokai\",\n    \"Light\",\n    \"Sepia\",\n];\n\n// ============================================================\n// Safe Helper Functions\n// ============================================================\n\n// safe_file_name, safe_file_stem, safe_extension, safe_parent, safe_lock\n// are now imported from core_mod::files\n\n// ============================================================\n// Config\n// ============================================================\n\n#[derive(Serialize, Deserialize, Clone)]\npub(crate) struct Config {\n    twitter_src: String,\n    download_src: String,\n    dest: String,\n    reference: String,\n    days_to_check: i64,\n    image_extensions: Vec\u003cString\u003e,\n    min_file_size_kb: u64,\n    max_workers: usize,\n    // Feature #9: Profiles\n    profiles: Vec\u003cProfile\u003e,\n    // Feature #10: Keybindings\n    keybindings: KeyBindings,\n    // Feature #19: JXL quality\n    jxl_quality: u32,\n    jxl_lossless: bool,\n    // Feature #20: Watch mode\n    watch_dirs: Vec\u003cString\u003e,\n    watch_interval_secs: u64,\n    // Feature #17: Error retry\n    max_retries: usize,\n    // Feature #2: Pause/Resume\n    checkpoint_file: String,\n    // Resize options\n    resize_enabled: bool,\n    resize_max_width: u32,\n    resize_max_height: u32,\n    // Watermark\n    watermark_enabled: bool,\n    watermark_text: String,\n}\n\nimpl Default for Config {\n    fn default() -\u003e Self {\n        Self {\n            twitter_src: r\"Z:\\gallery-dl\\twitter\\A_Quei_72\".into(),\n            download_src: r\"C:\\Users\\E1192\\Downloads\".into(),\n            dest: r\"Z:\\Pictures\\Rename\".into(),\n            reference: r\"Z:\\R1\".into(),\n            days_to_check: 7,\n            image_extensions: DEFAULT_IMAGE_EXTENSIONS\n                .iter()\n                .map(std::string::ToString::to_string)\n                .collect(),\n            min_file_size_kb: 0,\n            max_workers: 4,\n            profiles: Vec::new(),\n            keybindings: KeyBindings::default(),\n            jxl_quality: 90,\n            jxl_lossless: true,\n            watch_dirs: Vec::new(),\n            watch_interval_secs: 5,\n            max_retries: 3,\n            checkpoint_file: \"checkpoint.json\".into(),\n            resize_enabled: false,\n            resize_max_width: 1920,\n            resize_max_height: 1080,\n            watermark_enabled: false,\n            watermark_text: String::new(),\n        }\n    }\n}\n\nimpl Config {\n    fn load() -\u003e Self {\n        let path = PathBuf::from(\"config.json\");\n        if path.exists() {\n            if let Ok(data) = fs::read_to_string(\u0026path) {\n                if let Ok(cfg) = serde_json::from_str(\u0026data) {\n                    return cfg;\n                }\n            }\n        }\n        let cfg = Self::default();\n        let _ = cfg.save();\n        cfg\n    }\n\n    fn save(\u0026self) -\u003e Result\u003c()\u003e {\n        let data = serde_json::to_string_pretty(self).context(\"Failed to serialize config\")?;\n        fs::write(\"config.json\", data).context(\"Failed to write config.json\")?;\n        info!(\"Config saved to config.json\");\n        Ok(())\n    }\n}\n\n// ============================================================\n// History \u0026 Undo\n// ============================================================\n\n#[derive(Serialize, Deserialize, Clone, Default)]\nstruct HistoryEntry {\n    timestamp: String,\n    action: String,\n    source: String,\n    files_processed: usize,\n    files_removed: usize,\n    files_renamed: usize,\n    original_size: u64,\n    compressed_size: u64,\n    duration_secs: f64,\n    errors: usize,\n}\n\n#[derive(Serialize, Deserialize, Clone, Default)]\npub(crate) struct History {\n    entries: Vec\u003cHistoryEntry\u003e,\n    total_runs: usize,\n    total_files_processed: usize,\n    total_files_removed: usize,\n}\n\nimpl History {\n    fn load() -\u003e Self {\n        let path = PathBuf::from(\"history.json\");\n        if path.exists() {\n            if let Ok(data) = fs::read_to_string(\u0026path) {\n                if let Ok(h) = serde_json::from_str(\u0026data) {\n                    return h;\n                }\n            }\n        }\n        Self::default()\n    }\n\n    fn save(\u0026self) -\u003e anyhow::Result\u003c()\u003e {\n        let data = serde_json::to_string_pretty(self)?;\n        fs::write(\"history.json\", data)?;\n        Ok(())\n    }\n\n    fn add(\u0026mut self, entry: HistoryEntry) {\n        self.total_runs += 1;\n        self.total_files_processed += entry.files_processed;\n        self.total_files_removed += entry.files_removed;\n        self.entries.push(entry);\n        if self.entries.len() \u003e 100 {\n            self.entries.drain(0..self.entries.len() - 100);\n        }\n        let _ = self.save();\n    }\n}\n\n#[derive(Serialize, Deserialize, Clone)]\nstruct UndoEntry {\n    old_path: String,\n    new_path: String,\n}\n\n#[derive(Serialize, Deserialize, Clone, Default)]\npub(crate) struct UndoLog {\n    entries: Vec\u003cUndoEntry\u003e,\n}\n\nimpl UndoLog {\n    fn load() -\u003e Self {\n        let path = PathBuf::from(\"undo_log.json\");\n        if path.exists() {\n            if let Ok(data) = fs::read_to_string(\u0026path) {\n                if let Ok(u) = serde_json::from_str(\u0026data) {\n                    return u;\n                }\n            }\n        }\n        Self::default()\n    }\n\n    fn save(\u0026self) -\u003e anyhow::Result\u003c()\u003e {\n        let data = serde_json::to_string_pretty(self)?;\n        fs::write(\"undo_log.json\", data)?;\n        Ok(())\n    }\n\n    fn _add(\u0026mut self, old: \u0026str, new: \u0026str) {\n        self.entries.push(UndoEntry {\n            old_path: old.to_string(),\n            new_path: new.to_string(),\n        });\n        let _ = self.save();\n    }\n\n    fn undo_last(\u0026mut self) -\u003e Option\u003c(String, String)\u003e {\n        let entry = self.entries.pop()?;\n        let _ = self.save();\n        Some((entry.old_path, entry.new_path))\n    }\n}\n\n// ============================================================\n// KeyBindings (Feature #10)\n// ============================================================\n\n#[derive(Serialize, Deserialize, Clone)]\nstruct KeyBindings {\n    quit: String,\n    theme: String,\n    dry_run: String,\n    undo: String,\n    help: String,\n    filter: String,\n    sort: String,\n    profile: String,\n    batch: String,\n    export_log: String,\n    pause: String,\n    info: String,\n    stats: String,\n    watch: String,\n}\n\nimpl Default for KeyBindings {\n    fn default() -\u003e Self {\n        Self {\n            quit: \"q\".into(),\n            theme: \"t\".into(),\n            dry_run: \"d\".into(),\n            undo: \"u\".into(),\n            help: \"?\".into(),\n            filter: \"f\".into(),\n            sort: \"s\".into(),\n            profile: \"p\".into(),\n            batch: \"b\".into(),\n            export_log: \"Ctrl+e\".into(),\n            pause: \"Ctrl+p\".into(),\n            info: \"i\".into(),\n            stats: \"S\".into(),\n            watch: \"w\".into(),\n        }\n    }\n}\n\n// ============================================================\n// Profiles (Feature #9)\n// ============================================================\n\n#[derive(Serialize, Deserialize, Clone)]\nstruct Profile {\n    name: String,\n    config: Config,\n}\n\n// ============================================================\n// Batch Queue (Feature #4)\n// ============================================================\n\n#[derive(Serialize, Deserialize, Clone)]\npub(crate) struct BatchJob {\n    path: String,\n    status: String, // pending, processing, done, error\n    files_processed: usize,\n}\n\n// ============================================================\n// Duplicate Groups (Feature #3)\n// ============================================================\n\n#[derive(Clone)]\npub(crate) struct DuplicateGroup {\n    hash: String,\n    files: Vec\u003c(String, u64)\u003e, // (path, size)\n    selected: usize,\n}\n\n// ============================================================\n// File Filter (Feature #6)\n// ============================================================\n\n#[derive(Serialize, Deserialize, Clone, Default)]\npub(crate) struct FileFilter {\n    extensions: Vec\u003cString\u003e,\n    min_size_kb: u64,\n    max_size_kb: u64,\n    name_pattern: String,\n}\n\n#[allow(dead_code)]\nimpl FileFilter {\n    fn matches(\u0026self, path: \u0026PathBuf) -\u003e bool {\n        // Extension filter\n        if !self.extensions.is_empty() {\n            if let Some(ext) = path.extension().and_then(|e| e.to_str()) {\n                if !self\n                    .extensions\n                    .iter()\n                    .any(|e| e.eq_ignore_ascii_case(\u0026format!(\".{ext}\")))\n                {\n                    return false;\n                }\n            } else {\n                return false;\n            }\n        }\n        // Size filter\n        if self.min_size_kb \u003e 0 || self.max_size_kb \u003e 0 {\n            if let Ok(meta) = fs::metadata(path) {\n                let size_kb = meta.len() / 1024;\n                if self.min_size_kb \u003e 0 \u0026\u0026 size_kb \u003c self.min_size_kb {\n                    return false;\n                }\n                if self.max_size_kb \u003e 0 \u0026\u0026 size_kb \u003e self.max_size_kb {\n                    return false;\n                }\n            }\n        }\n        // Name pattern filter\n        if !self.name_pattern.is_empty() {\n            let name = safe_file_name(path).to_lowercase();\n            if !name.contains(\u0026self.name_pattern.to_lowercase()) {\n                return false;\n            }\n        }\n        true\n    }\n}\n\n// ============================================================\n// Sort Config (Feature #7)\n// ============================================================\n\n#[derive(Clone, PartialEq, Debug)]\nenum SortField {\n    Name,\n    Size,\n    Date,\n    Type,\n}\n\n#[derive(Clone)]\npub(crate) struct SortConfig {\n    field: SortField,\n    ascending: bool,\n}\n\nimpl Default for SortConfig {\n    fn default() -\u003e Self {\n        Self {\n            field: SortField::Name,\n            ascending: true,\n        }\n    }\n}\n\n// ============================================================\n// Confirm Actions (Feature #13)\n// ============================================================\n\n#[derive(Clone, PartialEq)]\npub(crate) enum ConfirmAction {\n    StartProcessing,\n    ClearHistory,\n    ClearUndo,\n}\n\n// ============================================================\n// Checkpoint (Feature #2)\n// ============================================================\n\n#[derive(Serialize, Deserialize, Clone, Default)]\npub(crate) struct Checkpoint {\n    step: usize,\n    files_processed: usize,\n    timestamp: String,\n}\n\n// ============================================================\n// State Restore (Feature #15)\n// ============================================================\n\n#[derive(Serialize, Deserialize, Clone, Default)]\npub(crate) struct AppStateStore {\n    last_menu_idx: usize,\n    last_theme_idx: usize,\n    last_dry_run: bool,\n}\n\nimpl AppStateStore {\n    fn load() -\u003e Self {\n        let path = PathBuf::from(\".io_tool_state.json\");\n        if path.exists() {\n            if let Ok(data) = fs::read_to_string(\u0026path) {\n                if let Ok(s) = serde_json::from_str(\u0026data) {\n                    return s;\n                }\n            }\n        }\n        Self::default()\n    }\n    fn save(\u0026self) {\n        let _ = fs::write(\n            \".io_tool_state.json\",\n            serde_json::to_string_pretty(self).unwrap_or_default(),\n        );\n    }\n}\n\n// ============================================================\n// Conversion Presets (New Feature #4)\n// ============================================================\n\n#[derive(Serialize, Deserialize, Clone)]\npub(crate) struct ConversionPreset {\n    name: String,\n    quality: u8,\n    lossless: bool,\n    description: String,\n}\n\nimpl Default for ConversionPreset {\n    fn default() -\u003e Self {\n        Self {\n            name: \"Default\".into(),\n            quality: 90,\n            lossless: false,\n            description: \"Balanced quality and size\".into(),\n        }\n    }\n}\n\nimpl ConversionPreset {\n    fn presets() -\u003e Vec\u003cSelf\u003e {\n        vec![\n            Self {\n                name: \"Web\".into(),\n                quality: 80,\n                lossless: false,\n                description: \"Smaller files for web\".into(),\n            },\n            Self {\n                name: \"Archive\".into(),\n                quality: 100,\n                lossless: true,\n                description: \"Lossless for archiving\".into(),\n            },\n            Self {\n                name: \"Balance\".into(),\n                quality: 90,\n                lossless: false,\n                description: \"Quality-size balance\".into(),\n            },\n            Self {\n                name: \"Max Quality\".into(),\n                quality: 100,\n                lossless: false,\n                description: \"Maximum quality lossy\".into(),\n            },\n        ]\n    }\n}\n\n// ============================================================\n// Size Comparison (New Feature #1)\n// ============================================================\n\n#[derive(Clone)]\npub(crate) struct SizeComparison {\n    filename: String,\n    original_size: u64,\n    converted_size: u64,\n    reduction_pct: f64,\n}\n\n// ============================================================\n// Error Detail (New Feature #3)\n// ============================================================\n\n#[derive(Clone)]\npub(crate) struct ErrorDetail {\n    filename: String,\n    error_msg: String,\n    timestamp: String,\n    _step: String,\n}\n\n// ============================================================\n// Compression Stats (New Feature #6)\n// ============================================================\n\n#[derive(Clone)]\npub(crate) struct CompressionStat {\n    format: String,\n    original_size: u64,\n    converted_size: u64,\n    count: usize,\n}\n\n// ============================================================\n// Scheduler (New Feature #9)\n// ============================================================\n\n#[derive(Serialize, Deserialize, Clone)]\npub(crate) struct SchedulerJob {\n    name: String,\n    hour: u8,\n    minute: u8,\n    days: Vec\u003cu8\u003e, // 0=Sun, 1=Mon, ...\n    enabled: bool,\n    last_run: Option\u003cString\u003e,\n}\n\nimpl Default for SchedulerJob {\n    fn default() -\u003e Self {\n        Self {\n            name: \"Default Job\".into(),\n            hour: 2,\n            minute: 0,\n            days: vec![1, 2, 3, 4, 5],\n            enabled: false,\n            last_run: None,\n        }\n    }\n}\n\n// ============================================================\n// Theme Config (New Feature #11)\n// ============================================================\n\n#[derive(Serialize, Deserialize, Clone)]\npub(crate) struct ThemeConfig {\n    name: String,\n    primary: (u8, u8, u8),\n    secondary: (u8, u8, u8),\n    accent: (u8, u8, u8),\n    success: (u8, u8, u8),\n    warning: (u8, u8, u8),\n    error: (u8, u8, u8),\n    bg: (u8, u8, u8),\n    fg: (u8, u8, u8),\n    muted: (u8, u8, u8),\n    bg_highlight: (u8, u8, u8),\n}\n\nimpl Default for ThemeConfig {\n    fn default() -\u003e Self {\n        Self {\n            name: \"Custom\".into(),\n            primary: (0, 255, 255),\n            secondary: (128, 0, 255),\n            accent: (255, 128, 0),\n            success: (0, 255, 128),\n            warning: (255, 255, 0),\n            error: (255, 64, 64),\n            bg: (20, 20, 30),\n            fg: (240, 240, 240),\n            muted: (100, 100, 120),\n            bg_highlight: (40, 40, 60),\n        }\n    }\n}\n\n// ============================================================\n// Widget Layout (New Feature #12)\n// ============================================================\n\n#[derive(Serialize, Deserialize, Clone)]\npub(crate) struct WidgetLayout {\n    show_summary: bool,\n    show_chart: bool,\n    show_history: bool,\n    show_compression: bool,\n    chart_position: (u16, u16), // row, col\n}\n\nimpl Default for WidgetLayout {\n    fn default() -\u003e Self {\n        Self {\n            show_summary: true,\n            show_chart: true,\n            show_history: true,\n            show_compression: false,\n            chart_position: (0, 0),\n        }\n    }\n}\n\n// ============================================================\n// Plugin Info (New Feature #20)\n// ============================================================\n\n#[derive(Clone)]\npub(crate) struct PluginInfo {\n    name: String,\n    _path: String,\n    enabled: bool,\n    description: String,\n}\n\n// ============================================================\n// Batch 3: New structs\n// ============================================================\n\n// B3 #1: Image preview (ASCII art)\npub(crate) struct ImagePreview {\n    ascii_lines: Vec\u003cString\u003e,\n    width: usize,\n    height: usize,\n    filename: String,\n}\n\n// B3 #9: Recent files\npub(crate) struct RecentFile {\n    path: String,\n    processed_at: String,\n    file_type: String,\n    size: u64,\n}\n\n// B3 #10: Tag system\npub(crate) struct FileTag {\n    file_pattern: String,\n    tags: Vec\u003cString\u003e,\n}\n\n// B3 #12: File tree node\n#[derive(Clone)]\n#[allow(dead_code)]\npub struct FileTreeNode {\n    pub name: String,\n    pub path: String,\n    pub is_dir: bool,\n    pub expanded: bool,\n    pub depth: usize,\n    pub children: Vec\u003cFileTreeNode\u003e,\n}\n\n// B3 #13: Batch rename pattern\npub(crate) struct RenamePattern {\n    pattern: String,\n    replacement: String,\n    preview: Vec\u003c(String, String)\u003e, // (old_name, new_name)\n    use_regex: bool,\n}\n\n// B3 #14: Processing timeline entry\npub(crate) struct TimelineEntry {\n    timestamp: String,\n    event_type: String, // \"start\", \"progress\", \"complete\", \"error\"\n    description: String,\n    progress: f64,\n}\n\n// B3 #17: Notification\npub(crate) struct Notification {\n    message: String,\n    timestamp: String,\n    level: String, // \"info\", \"warning\", \"error\", \"success\"\n    read: bool,\n}\n\n// B3 #20: Keyboard macro\n#[allow(dead_code)]\npub(crate) struct KeyMacro {\n    name: String,\n    keys: Vec\u003cString\u003e, // Key descriptions\n    recording: bool,\n}\n\n// Similar image search\npub(crate) struct SimilarImageGroup {\n    hash: u64,\n    files: Vec\u003c(String, u64)\u003e, // (path, file_size)\n    hash_type: String,         // \"aHash\" or \"dHash\"\n}\n\n// ============================================================\n// Theme\n// ============================================================\n\npub struct Theme {\n    pub primary: Color,\n    pub _secondary: Color,\n    pub accent: Color,\n    pub success: Color,\n    pub error: Color,\n    pub warning: Color,\n    pub muted: Color,\n    pub bg_highlight: Color,\n    pub bg: Color,\n    pub fg: Color,\n}\n\nimpl Theme {\n    fn from_index(idx: usize) -\u003e Self {\n        match idx % 12 {\n            // Cyan (default)\n            0 =\u003e Theme {\n                primary: Color::Cyan,\n                _secondary: Color::LightCyan,\n                accent: Color::White,\n                success: Color::Green,\n                error: Color::Red,\n                warning: Color::Yellow,\n                muted: Color::DarkGray,\n                bg_highlight: Color::Cyan,\n                bg: Color::Black,\n                fg: Color::White,\n            },\n            // Green\n            1 =\u003e Theme {\n                primary: Color::Green,\n                _secondary: Color::LightGreen,\n                accent: Color::White,\n                success: Color::LightGreen,\n                error: Color::Red,\n                warning: Color::Yellow,\n                muted: Color::DarkGray,\n                bg_highlight: Color::Green,\n                bg: Color::Black,\n                fg: Color::White,\n            },\n            // Magenta\n            2 =\u003e Theme {\n                primary: Color::Magenta,\n                _secondary: Color::LightMagenta,\n                accent: Color::White,\n                success: Color::Green,\n                error: Color::Red,\n                warning: Color::Yellow,\n                muted: Color::DarkGray,\n                bg_highlight: Color::Magenta,\n                bg: Color::Black,\n                fg: Color::White,\n            },\n            // Yellow\n            3 =\u003e Theme {\n                primary: Color::Yellow,\n                _secondary: Color::LightYellow,\n                accent: Color::Black,\n                success: Color::Green,\n                error: Color::Red,\n                warning: Color::LightYellow,\n                muted: Color::DarkGray,\n                bg_highlight: Color::Yellow,\n                bg: Color::Black,\n                fg: Color::White,\n            },\n            // Blue\n            4 =\u003e Theme {\n                primary: Color::Blue,\n                _secondary: Color::LightBlue,\n                accent: Color::White,\n                success: Color::Green,\n                error: Color::Red,\n                warning: Color::Yellow,\n                muted: Color::DarkGray,\n                bg_highlight: Color::Blue,\n                bg: Color::Black,\n                fg: Color::White,\n            },\n            // Red\n            5 =\u003e Theme {\n                primary: Color::Red,\n                _secondary: Color::LightRed,\n                accent: Color::White,\n                success: Color::Green,\n                error: Color::LightRed,\n                warning: Color::Yellow,\n                muted: Color::DarkGray,\n                bg_highlight: Color::Red,\n                bg: Color::Black,\n                fg: Color::White,\n            },\n            // Solarized (Dark)\n            6 =\u003e Theme {\n                primary: Color::Rgb(38, 139, 210),    // Solarized blue\n                _secondary: Color::Rgb(42, 161, 152), // Solarized cyan\n                accent: Color::Rgb(203, 75, 22),      // Solarized orange\n                success: Color::Rgb(133, 153, 0),     // Solarized green\n                error: Color::Rgb(220, 50, 47),       // Solarized red\n                warning: Color::Rgb(181, 137, 0),     // Solarized yellow\n                muted: Color::Rgb(88, 110, 117),      // Solarized base01\n                bg_highlight: Color::Rgb(7, 54, 66),  // Solarized base02\n                bg: Color::Rgb(0, 43, 54),            // Solarized base03\n                fg: Color::Rgb(238, 232, 213),        // Solarized base2\n            },\n            // Dracula\n            7 =\u003e Theme {\n                primary: Color::Rgb(189, 147, 249),    // Purple\n                _secondary: Color::Rgb(139, 233, 253), // Cyan\n                accent: Color::Rgb(255, 121, 198),     // Pink\n                success: Color::Rgb(80, 250, 123),     // Green\n                error: Color::Rgb(255, 85, 85),        // Red\n                warning: Color::Rgb(241, 250, 140),    // Yellow\n                muted: Color::Rgb(98, 114, 164),       // Comment\n                bg_highlight: Color::Rgb(68, 71, 90),  // Current line\n                bg: Color::Rgb(40, 42, 54),            // Background\n                fg: Color::Rgb(248, 248, 242),         // Foreground\n            },\n            // Nord\n            8 =\u003e Theme {\n                primary: Color::Rgb(136, 192, 208),    // Frost\n                _secondary: Color::Rgb(129, 161, 193), // Frost light\n                accent: Color::Rgb(180, 142, 173),     // Aurora purple\n                success: Color::Rgb(163, 190, 140),    // Aurora green\n                error: Color::Rgb(191, 97, 106),       // Aurora red\n                warning: Color::Rgb(235, 203, 139),    // Aurora yellow\n                muted: Color::Rgb(76, 86, 106),        // Nord3\n                bg_highlight: Color::Rgb(59, 66, 82),  // Nord2\n                bg: Color::Rgb(46, 52, 64),            // Nord1\n                fg: Color::Rgb(216, 222, 233),         // Nord5\n            },\n            // Monokai\n            9 =\u003e Theme {\n                primary: Color::Rgb(166, 226, 46),     // Green\n                _secondary: Color::Rgb(102, 217, 239), // Cyan\n                accent: Color::Rgb(249, 38, 114),      // Pink\n                success: Color::Rgb(166, 226, 46),     // Green\n                error: Color::Rgb(249, 38, 114),       // Pink\n                warning: Color::Rgb(230, 219, 116),    // Yellow\n                muted: Color::Rgb(117, 113, 94),       // Comment\n                bg_highlight: Color::Rgb(73, 72, 62),  // Selection\n                bg: Color::Rgb(39, 40, 34),            // Background\n                fg: Color::Rgb(248, 248, 242),         // Foreground\n            },\n            // Light\n            10 =\u003e Theme {\n                primary: Color::Rgb(0, 100, 200),    // Blue\n                _secondary: Color::Rgb(0, 150, 136), // Teal\n                accent: Color::Rgb(200, 80, 0),      // Orange\n                success: Color::Rgb(46, 125, 50),    // Green\n                error: Color::Rgb(198, 40, 40),      // Red\n                warning: Color::Rgb(245, 124, 0),    // Amber\n                muted: Color::Rgb(158, 158, 158),    // Gray\n                bg_highlight: Color::Rgb(224, 224, 224),\n                bg: Color::Rgb(250, 250, 250), // Near white\n                fg: Color::Rgb(33, 33, 33),    // Near black\n            },\n            // Sepia\n            _ =\u003e Theme {\n                primary: Color::Rgb(140, 100, 50),    // Brown\n                _secondary: Color::Rgb(180, 140, 80), // Tan\n                accent: Color::Rgb(200, 120, 40),     // Amber\n                success: Color::Rgb(100, 140, 60),    // Olive green\n                error: Color::Rgb(180, 60, 40),       // Dark red\n                warning: Color::Rgb(200, 160, 40),    // Gold\n                muted: Color::Rgb(160, 140, 110),     // Warm gray\n                bg_highlight: Color::Rgb(230, 215, 190),\n                bg: Color::Rgb(250, 240, 225), // Cream\n                fg: Color::Rgb(60, 40, 20),    // Dark brown\n            },\n        }\n    }\n}\n\n// ============================================================\n// UI Components (ferrocopy-inspired)\n// ============================================================\n\n// Toast notification with auto-dismiss (using ui::components)\n#[allow(dead_code)]\nuse ui::components::{AlertVariant, BadgeVariant, ButtonVariant, Toast, ToastType};\n\n/// Render a status badge with icon and color\nfn render_status_badge(status: \u0026str, theme: \u0026Theme) -\u003e Line\u003c'static\u003e {\n    let (icon, color, text) = match status {\n        \"copying\" | \"processing\" =\u003e (\"▶\", theme.accent, \"Processing\"),\n        \"paused\" =\u003e (\"⏸\", theme.warning, \"Paused\"),\n        \"done\" | \"complete\" =\u003e (\"✓\", theme.success, \"Done\"),\n        \"error\" =\u003e (\"✗\", theme.error, \"Error\"),\n        \"scanning\" =\u003e (\"⟳\", theme.primary, \"Scanning\"),\n        _ =\u003e (\" \", theme.muted, \"Ready\"),\n    };\n    Line::from(Span::styled(\n        format!(\" {icon} {text} \"),\n        Style::default().fg(Color::White).bg(color),\n    ))\n}\n\n/// Render a styled button with variant\n#[allow(dead_code)]\nfn render_button_variant(label: \u0026str, variant: ButtonVariant, theme: \u0026Theme) -\u003e Line\u003c'static\u003e {\n    let (fg, _bg) = match variant {\n        ButtonVariant::Primary =\u003e (Color::White, theme.primary),\n        ButtonVariant::Secondary =\u003e (theme.fg, theme.muted),\n        ButtonVariant::Success =\u003e (Color::White, theme.success),\n        ButtonVariant::Danger =\u003e (Color::White, theme.error),\n        ButtonVariant::Ghost =\u003e (theme.fg, Color::Reset),\n    };\n    Line::from(Span::styled(format!(\" {label} \"), Style::default().fg(fg)))\n}\n\n/// Render a badge with variant\n#[allow(dead_code)]\nfn render_badge(text: \u0026str, variant: BadgeVariant, theme: \u0026Theme) -\u003e Line\u003c'static\u003e {\n    let color = match variant {\n        BadgeVariant::Info =\u003e theme.primary,\n        BadgeVariant::Success =\u003e theme.success,\n        BadgeVariant::Warning =\u003e theme.warning,\n        BadgeVariant::Error =\u003e theme.error,\n        BadgeVariant::Muted =\u003e theme.muted,\n    };\n    Line::from(Span::styled(\n        format!(\" {text} \"),\n        Style::default().fg(Color::White).bg(color),\n    ))\n}\n\n/// Render an alert box with icon, title, and message\n#[allow(dead_code)]\nfn render_alert(\n    title: \u0026str,\n    message: \u0026str,\n    variant: AlertVariant,\n    theme: \u0026Theme,\n) -\u003e Vec\u003cLine\u003c'static\u003e\u003e {\n    let (icon, color) = match variant {\n        AlertVariant::Info =\u003e (\"ℹ\", theme.primary),\n        AlertVariant::Success =\u003e (\"✔\", theme.success),\n        AlertVariant::Warning =\u003e (\"⚠\", theme.warning),\n        AlertVariant::Error =\u003e (\"✖\", theme.error),\n    };\n    vec![\n        Line::from(vec![\n            Span::styled(format!(\"  {icon} \"), Style::default().fg(color)),\n            Span::styled(\n                title.to_string(),\n                Style::default().fg(theme.fg).add_modifier(Modifier::BOLD),\n            ),\n        ]),\n        Line::from(Span::styled(\n            format!(\"    {message}\"),\n            Style::default().fg(theme.muted),\n        )),\n    ]\n}\n\n/// Render a section heading with icon\n#[allow(dead_code)]\nfn render_section_heading(icon: \u0026str, text: \u0026str, theme: \u0026Theme) -\u003e Line\u003c'static\u003e {\n    Line::from(vec![\n        Span::styled(format!(\"{icon} \"), Style::default().fg(theme.accent)),\n        Span::styled(\n            text.to_string(),\n            Style::default().fg(theme.fg).add_modifier(Modifier::BOLD),\n        ),\n    ])\n}\n\n/// Render an empty state placeholder\nfn render_empty_state(icon: \u0026str, title: \u0026str, message: \u0026str, theme: \u0026Theme) -\u003e Vec\u003cLine\u003c'static\u003e\u003e {\n    vec![\n        Line::from(\"\"),\n        Line::from(Span::styled(\n            format!(\"    {icon}\"),\n            Style::default().fg(theme.muted),\n        )),\n        Line::from(Span::styled(\n            format!(\"    {title}\"),\n            Style::default().fg(theme.fg).add_modifier(Modifier::BOLD),\n        )),\n        Line::from(Span::styled(\n            format!(\"    {message}\"),\n            Style::default().fg(theme.muted),\n        )),\n        Line::from(\"\"),\n    ]\n}\n\n/// Render a card/panel frame with border\n#[allow(dead_code)]\nfn render_card_frame\u003c'a\u003e(\n    title: \u0026str,\n    content_lines: Vec\u003cLine\u003c'a\u003e\u003e,\n    theme: \u0026Theme,\n) -\u003e Vec\u003cLine\u003c'a\u003e\u003e {\n    let width: usize = 60;\n    let border = \"─\".repeat(width.saturating_sub(2));\n    let mut lines = vec![Line::from(vec![\n        Span::styled(\"┌\", Style::default().fg(theme.muted)),\n        Span::styled(\n            format!(\" {title} \"),\n            Style::default()\n                .fg(theme.accent)\n                .add_modifier(Modifier::BOLD),\n        ),\n        Span::styled(border.clone(), Style::default().fg(theme.muted)),\n    ])];\n    for line in content_lines {\n        let mut new_spans: Vec\u003cSpan\u003c'a\u003e\u003e =\n            vec![Span::styled(\"│ \", Style::default().fg(theme.muted))];\n        for span in line.spans {\n            new_spans.push(span);\n        }\n        lines.push(Line::from(new_spans));\n    }\n    lines.push(Line::from(Span::styled(\n        format!(\"└{}\", \"─\".repeat(width.saturating_sub(1))),\n        Style::default().fg(theme.muted),\n    )));\n    lines\n}\n\n/// Render a file table row with columns\n#[allow(dead_code)]\nfn render_file_table_row(\n    icon: \u0026str,\n    name: \u0026str,\n    size: \u0026str,\n    progress: f64,\n    status: \u0026str,\n    theme: \u0026Theme,\n) -\u003e Line\u003c'static\u003e {\n    let status_color = match status {\n        \"Done\" =\u003e theme.success,\n        \"Copying\" | \"Processing\" =\u003e theme.accent,\n        \"Error\" =\u003e theme.error,\n        _ =\u003e theme.muted,\n    };\n    let bar = make_gauge_bar(progress, 10);\n    Line::from(vec![\n        Span::styled(format!(\"{icon} \"), Style::default().fg(theme.accent)),\n        Span::styled(\n            format!(\"{:\u003c30}\", truncate_str(name, 30)),\n            Style::default().fg(theme.fg),\n        ),\n        Span::styled(format!(\"{size:\u003e10}\"), Style::default().fg(theme.muted)),\n        Span::styled(format!(\" [{bar}]\"), Style::default().fg(theme.primary)),\n        Span::styled(\n            format!(\" {:\u003e5.1}%\", progress * 100.0),\n            Style::default().fg(theme.accent),\n        ),\n        Span::styled(format!(\" {status}\"), Style::default().fg(status_color)),\n    ])\n}\n\n/// Render enhanced progress display with speed, ETA, elapsed\n#[allow(dead_code, clippy::too_many_arguments)]\nfn render_progress_detail(\n    progress: f64,\n    speed: \u0026str,\n    eta: \u0026str,\n    elapsed: \u0026str,\n    files_done: usize,\n    total_files: usize,\n    current_file: \u0026str,\n    theme: \u0026Theme,\n) -\u003e Vec\u003cLine\u003c'static\u003e\u003e {\n    let bar = make_gauge_bar(progress, 40);\n    vec![\n        Line::from(vec![\n            Span::styled(\"  \", Style::default()),\n            Span::styled(\n                format!(\"{:\u003e5.1}%\", progress * 100.0),\n                Style::default()\n                    .fg(theme.accent)\n                    .add_modifier(Modifier::BOLD),\n            ),\n            Span::styled(format!(\" [{bar}]\"), Style::default().fg(theme.primary)),\n        ]),\n        Line::from(vec![\n            Span::styled(\"  \", Style::default()),\n            Span::styled(format!(\"Speed: {speed}\"), Style::default().fg(theme.fg)),\n            Span::styled(\"  │  \", Style::default().fg(theme.muted)),\n            Span::styled(format!(\"ETA: {eta}\"), Style::default().fg(theme.fg)),\n            Span::styled(\"  │  \", Style::default().fg(theme.muted)),\n            Span::styled(format!(\"Elapsed: {elapsed}\"), Style::default().fg(theme.fg)),\n        ]),\n        Line::from(vec![\n            Span::styled(\"  \", Style::default()),\n            Span::styled(\n                format!(\"Files: {files_done}/{total_files}\"),\n                Style::default().fg(theme.muted),\n            ),\n        ]),\n        Line::from(vec![\n            Span::styled(\"  \", Style::default()),\n            Span::styled(\n                format!(\"Current: {}\", truncate_str(current_file, 50)),\n                Style::default().fg(theme.muted),\n            ),\n        ]),\n    ]\n}\n\n/// Render toast overlay (top-right corner)\nfn render_toasts(toasts: \u0026[Toast], area: Rect, f: \u0026mut Frame, theme: \u0026Theme) {\n    let max_toasts = 3;\n    let toast_width = 40.min(area.width.saturating_sub(2) as usize);\n    let start_y = area.y + 1;\n\n    for (i, toast) in toasts.iter().take(max_toasts).enumerate() {\n        let y = start_y + i as u16 * 3;\n        if y + 2 \u003e area.y + area.height {\n            break;\n        }\n        let x = area.x + area.width.saturating_sub(toast_width as u16 + 2);\n        let toast_area = Rect::new(x, y, toast_width as u16 + 2, 2);\n\n        let (icon, color) = match toast.toast_type {\n            ToastType::Info =\u003e (\"ℹ\", theme.primary),\n            ToastType::Success =\u003e (\"✔\", theme.success),\n            ToastType::Error =\u003e (\"✖\", theme.error),\n            ToastType::Warning =\u003e (\"⚠\", theme.warning),\n        };\n\n        let toast_block = Paragraph::new(Line::from(vec![\n            Span::styled(format!(\"{icon} \"), Style::default().fg(color)),\n            Span::styled(\n                truncate_str(\u0026toast.message, toast_width.saturating_sub(4)),\n                Style::default().fg(theme.fg),\n            ),\n        ]))\n        .block(\n            Block::default()\n                .borders(Borders::ALL)\n                .border_style(Style::default().fg(color)),\n        );\n        f.render_widget(toast_block, toast_area);\n    }\n}\n\n// ============================================================\n// HELPER FUNCTIONS - Utilities and Formatters\n// ============================================================\n// These are utility functions used by render functions and other parts of the code.\n// TODO: Extract to src/utils.rs for better organization\n\nfn truncate_str(s: \u0026str, max_len: usize) -\u003e String {\n    if s.len() \u003c= max_len {\n        s.to_string()\n    } else {\n        let trunc = max_len.saturating_sub(3);\n        // Find a valid char boundary at or before trunc\n        let end = if trunc \u003e= s.len() {\n            s.len()\n        } else {\n            let mut boundary = trunc;\n            while boundary \u003e 0 \u0026\u0026 !s.is_char_boundary(boundary) {\n                boundary -= 1;\n            }\n            boundary\n        };\n        format!(\"{}...\", \u0026s[..end])\n    }\n}\n\n// ============================================================\n// Animated gauge chars\n// ============================================================\n\nconst GAUGE_CHARS: \u0026[char] = \u0026['░', '▒', '▓', '█'];\nconst SPINNER_CHARS: \u0026[char] = \u0026['⠋', '⠙', '⠹', '⠸', '⠼', '⠴', '⠦', '⠧', '⠇', '⠏'];\n\nfn make_gauge_bar(ratio: f64, width: usize) -\u003e String {\n    let filled = (ratio * width as f64) as usize;\n    let empty = width.saturating_sub(filled);\n    let partial = ((ratio * width as f64) - filled as f64) * 4.0;\n    let partial_idx = partial as usize;\n\n    let mut bar = String::new();\n    for _ in 0..filled {\n        bar.push('█');\n    }\n    if filled \u003c width \u0026\u0026 partial_idx \u003e 0 {\n        bar.push(GAUGE_CHARS[partial_idx.min(3)]);\n    }\n    for _ in 0..empty.saturating_sub(usize::from(partial_idx \u003e 0)) {\n        bar.push('░');\n    }\n    bar\n}\n\nfn _make_sub_progress_bar(label: \u0026str, ratio: f64, width: usize) -\u003e String {\n    let bar = make_gauge_bar(ratio, width);\n    format!(\"{} [{}] {:.0}%\", label, bar, ratio * 100.0)\n}\n\n// ============================================================\n// Utility\n// ============================================================\n\n// format_size is now imported from core_mod::files\n\nfn format_duration(secs: f64) -\u003e String {\n    if secs \u003c 60.0 {\n        format!(\"{secs:.1}s\")\n    } else if secs \u003c 3600.0 {\n        format!(\"{}m {:.0}s\", (secs / 60.0) as u32, secs % 60.0)\n    } else {\n        format!(\n            \"{}h {}m\",\n            (secs / 3600.0) as u32,\n            ((secs % 3600.0) / 60.0) as u32\n        )\n    }\n}\n\n// ============================================================\n// Menu Items\n// ============================================================\n\n#[derive(Clone, Copy, PartialEq)]\npub(crate) enum MenuItem {\n    FullProcess,\n    RenameOnly,\n    TimestampRename,\n    ImageToJxl,\n    HashCacheDb,\n    Settings,\n    BatchQueue,       // Feature #4\n    Profiles,         // Feature #9\n    WatchMode,        // Feature #20\n le Classification\",\n            MenuItem::MetaEdit =\u003e \"Metadata Editor\",\n            MenuItem::ConfigIO =\u003e \"Config Import/Export\",\n            MenuItem::Plugins =\u003e \"Plugins\",\n            // Batch 3\n            MenuItem::ImagePreview =\u003e \"Image Preview\",\n            MenuItem::FuzzyFinder =\u003e \"Fuzzy Finder\",\n            MenuItem::SplitPane =\u003e \"Split Pane View\",\n            MenuItem::QuickActions =\u003e \"Quick Actions\",\n            MenuItem::RecentFiles =\u003e \"Recent Files\",\n            MenuItem::TagSystem =\u003e \"Tag System\",\n            MenuItem::SideBySideDiff =\u003e \"Side-by-side Diff\",\n            MenuItem::FileTreeView =\u003e \"File Tree View\",\n            MenuItem::RenamePattern =\u003e \"Batch Rename Pattern\",\n            MenuItem::Timeline =\u003e \"Processing Timeline\",\n            MenuItem::CommandPalette =\u003e \"Command Palette\",\n            MenuItem::NotificationCenter =\u003e \"Notification Center\",\n            MenuItem::ExportReport =\u003e \"Export Report\",\n            MenuItem::SimilarImages =\u003e \"Similar Image Search\",\n            MenuItem::FolderSync =\u003e \"Folder Sync/Backup\",\n            MenuItem::KeybindCustom =\u003e \"Keybind Customization\",\n        }\n    }\n\n    fn description(\u0026self) -\u003e \u0026str {\n        match self {\n            MenuItem::FullProcess =\u003e \"Run all steps in sequence | 全ステップを一括実行\",\n            MenuItem::RenameOnly =\u003e {\n                \"Remove underscores and parentheses | アンダースコア・括弧を除去\"\n            }\n            MenuItem::TimestampRename =\u003e \"Rename by last modified timestamp | 更新日時でリネーム\",\n            MenuItem::ImageToJxl =\u003e \"Convert images to lossless JXL | 画像をロスレスJXL変換\",\n            MenuItem::HashCacheDb =\u003e \"Run hash_cache_db for duplicates | 重複検出用ハッシュDB構築\",\n            MenuItem::Settings =\u003e \"Configure paths and options | パス・オプション設定\",\n            MenuItem::BatchQueue =\u003e \"Process multiple folders in order | 複数フォルダを順次処理\",\n            MenuItem::Profiles =\u003e \"Save/load configuration profiles | 設定プロファイルの保存/読込\",\n            MenuItem::WatchMode =\u003e \"Auto-process new files in folders | フォルダ監視で自動処理\",\n            MenuItem::Statistics =\u003e \"View processing history and stats | 処理履歴と統計を表示\",\n            MenuItem::Duplicates =\u003e \"View and manage duplicate files | 重複ファイルの確認・管理\",\n            MenuItem::JxlSettings =\u003e \"Configure JXL quality settings | JXL変換品質の設定\",\n            MenuItem::SizeCompare =\u003e \"Compare sizes before/after | 変換前後のサイズ比較\",\n            MenuItem::ErrorPanel =\u003e \"View error details for failures | 失敗ファイルのエラー詳細\",\n            MenuItem::Presets =\u003e \"Quick conversion presets | クイック変換プリセット\",\n            MenuItem::Scheduler =\u003e \"Schedule batch processing | バッチ処理のスケジュール\",\n            MenuItem::HistoryExport =\u003e \"Export history to CSV/JSON | 履歴をCSV/JSON出力\",\n            MenuItem::ThemeEditor =\u003e \"Customize color theme | カラーテーマのカスタマイズ\",\n            MenuItem::CompressionGraph =\u003e {\n                \"Compression ratio by format | フォーマット別圧縮率グラフ\"\n            }\n            MenuItem::FileClassify =\u003e \"Auto-classify files by type | ファイル自動分類\",\n            MenuItem::MetaEdit =\u003e \"Batch edit EXIF metadata | EXIFメタデータ一括編集\",\n            MenuItem::ConfigIO =\u003e \"Import/export config files | 設定ファイルの导入/出力\",\n            MenuItem::Plugins =\u003e \"Manage conversion plugins | 変換プラグイン管理\",\n            // Batch 3\n            MenuItem::ImagePreview =\u003e \"Preview images as ASCII art | 画像をASCIIアートでプレビュー\",\n            MenuItem::FuzzyFinder =\u003e \"Fuzzy search files by name | ファジーファイル検索\",\n            MenuItem::SplitPane =\u003e \"Split view comparison | 分割ビューで比較\",\n            MenuItem::QuickActions =\u003e {\n                \"Quick access to actions | よく使うアクションにクイックアクセス\"\n            }\n            MenuItem::RecentFiles =\u003e \"View recently processed files | 最近処理したファイル\",\n            MenuItem::TagSystem =\u003e \"Tag and categorize files | ファイルにタグ付け・分類\",\n            MenuItem::SideBySideDiff =\u003e \"Compare before/after sizes | 変換前後のサイズを並列比較\",\n            MenuItem::FileTreeView =\u003e \"Browse directory tree | ディレクトリツリーを閲覧\",\n            MenuItem::RenamePattern =\u003e \"Preview regex rename | 正規表現リネームのプレビュー\",\n            MenuItem::Timeline =\u003e \"Visual processing timeline | 処理履歴のタイムライン表示\",\n            MenuItem::CommandPalette =\u003e \"Search and execute commands | コマンド検索・実行\",\n            MenuItem::NotificationCenter =\u003e \"View notification history | 通知履歴を表示\",\n            MenuItem::ExportReport =\u003e \"Export processing report | 処理レポートを出力\",\n            MenuItem::SimilarImages =\u003e {\n                \"Find similar images (perceptual hash) | 類似画像検出(知覚ハッシュ)\"\n            }\n            MenuItem::FolderSync =\u003e \"Sync folders and auto-backup | フォルダ同期・自動バックアップ\",\n            MenuItem::KeybindCustom =\u003e \"Customize keyboard shortcuts | キーバインドのカスタマイズ\",\n        }\n    }\n}\n\n// ============================================================\n// App State\n// ============================================================\n\n#[derive(Clone, PartialEq)]\n#[allow(dead_code)]\npub(crate) enum AppState {\n    Splash, // Splash screen\n    Menu,\n    StepSelect,\n    Preview,\n    Processing,\n    Done,\n    Settings,\n    Help,            // Feature #14\n    BatchQueue,      // Feature #4\n    DuplicateGroups, // Feature #3\n    Stats,           // Feature #8\n    Profiles,        // Feature #9\n    JxlSettings,     // Feature #19\n    WatchMode,       // Feature #20\n    FilterSort,      // Feature #6, #7\n    InfoPanel,       // Feature #11\n    ConfirmDialog,   // Feature #13\n    // New features\n    SizeCompare,      // New #1: Size comparison\n    ErrorPanel,       // New #3: Error details\n    Presets,          // New #4: Conversion presets\n    Scheduler,        // ize,\n    pub(crate) preview_file_count: usize,\n    pub(crate) preview_total_size: u64,\n    // Processing\n    pub(crate) logs: Arc\u003cMutex\u003cVec\u003cString\u003e\u003e\u003e,\n    pub(crate) progress: Arc\u003cMutex\u003cf64\u003e\u003e,\n    pub(crate) progress_detail: Arc\u003cMutex\u003cString\u003e\u003e,\n    pub(crate) current_step: Arc\u003cMutex\u003cString\u003e\u003e,\n    pub(crate) is_processing: Arc\u003cMutex\u003cbool\u003e\u003e,\n    pub(crate) errors: Arc\u003cMutex\u003cVec\u003cString\u003e\u003e\u003e,\n    pub(crate) step_progress: Arc\u003cMutex\u003cVec\u003cf64\u003e\u003e\u003e,\n    pub(crate) start_time: Arc\u003cMutex\u003cOption\u003cInstant\u003e\u003e\u003e,\n    pub(crate) files_processed: Arc\u003cMutex\u003cusize\u003e\u003e,\n    // Log search\n    pub(crate) search_mode: bool,\n    pub(crate) search_query: String,\n    pub(crate) filtered_log_indices: Vec\u003cusize\u003e,\n    // Settings\n    pub(crate) settings_selected: usize,\n    // Batch queue (Feature #4)\n    pub(crate) batch_queue: Vec\u003cBatchJob\u003e,\n    pub(crate) batch_selected: usize,\n    pub(crate) batch_adding: bool,\n    pub(crate) batch_input: String,\n    // Animation\n    pub(crate) spinner_idx: usize,\n    pub(crate) frame_count: u64,\n    // Feature #2: Pause/Resume\n    pub(crate) is_paused: Arc\u003cMutex\u003cbool\u003e\u003e,\n    pub(crate) is_interrupted: Arc\u003cMutex\u003cbool\u003e\u003e, // Esc to interrupt processing\n    pub(crate) checkpoint: Arc\u003cMutex\u003cOption\u003cCheckpoint\u003e\u003e\u003e,\n    // Feature #3: Duplicate groups\n    pub(crate) duplicate_groups: Vec\u003cDuplicateGroup\u003e,\n    pub(crate) dup_group_selected: usize,\n    pub(crate) dup_file_selected: usize,\n    // Feature #6, #7: Filter \u0026 Sort\n    pub(crate) filter: FileFilter,\n    pub(crate) sort_config: SortConfig,\n    pub(crate) filter_active: bool,\n    pub(crate) filter_selected: usize,\n    // Feature #8: Stats\n    pub(crate) stats_
